<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: page('总览', ~{::main})}">
<body><main>

<!-- ── Top Stats ── -->
<div class="row g-3 mb-4">
    <div class="col-6 col-lg-3">
        <div class="stat-card sc-blue">
            <span class="sc-icon">🧠</span>
            <div class="sc-val" th:text="${topWallets.size()}">0</div>
            <div class="sc-lbl">聪明钱追踪</div>
            <div class="mini-bar"><div class="mini-bar-fill" style="width:65%"></div></div>
        </div>
    </div>
    <div class="col-6 col-lg-3">
        <div class="stat-card sc-green">
            <span class="sc-icon">⚡</span>
            <div class="sc-val" th:text="${recentSignals.size()}">0</div>
            <div class="sc-lbl">今日信号</div>
            <div class="mini-bar"><div class="mini-bar-fill" style="width:42%;background:linear-gradient(90deg,var(--green),#34d399)"></div></div>
        </div>
    </div>
    <div class="col-6 col-lg-3">
        <div class="stat-card sc-purple">
            <span class="sc-icon">🔗</span>
            <div class="sc-val" style="font-size:.85rem;line-height:2.2;letter-spacing:0">
                <span class="chain-badge c-1">ETH</span>
                <span class="chain-badge c-56 ms-1">BSC</span>
                <span class="chain-badge c-8453 ms-1">Base</span>
                <span class="chain-badge c-501 ms-1">SOL</span>
            </div>
            <div class="sc-lbl">覆盖链</div>
        </div>
    </div>
    <div class="col-6 col-lg-3">
        <div class="stat-card sc-cyan">
            <span class="sc-icon">📡</span>
            <div class="sc-val" style="font-size:1rem">OKX DEX</div>
            <div class="sc-lbl">数据来源</div>
            <div class="sc-sub">OnChain Signals API</div>
        </div>
    </div>
</div>

<!-- ── Main Grid ── -->
<div class="row g-3">

    <!-- 聪明钱 Top 10 -->
    <div class="col-xl-6">
        <div class="card h-100">
            <div class="card-header">
                🏆 聪明钱排行 Top 10
                <span class="info-pill ms-2">综合评分</span>
                <a href="/smart-money" class="btn-outline ms-auto" style="font-size:.75rem">全部 →</a>
            </div>
            <div th:if="${topWallets.isEmpty()}" class="empty-state">
                <div class="ei">🔍</div>
                <div>暂无数据，先运行<br><code style="color:var(--blue)">python main.py all</code></div>
            </div>
            <table th:unless="${topWallets.isEmpty()}" class="table">
                <thead><tr>
                    <th style="width:44px">#</th>
                    <th>钱包地址</th>
                    <th>评分</th>
                    <th>胜率</th>
                    <th>PnL</th>
                </tr></thead>
                <tbody>
                <tr th:each="w, st : ${topWallets}"
                    th:class="${st.count<=3 ? 'rank-'+st.count : ''}">
                    <td>
                        <span class="mono fw-7 t-dim"
                              th:text="${st.count==1?'🥇':st.count==2?'🥈':st.count==3?'🥉':'#'+st.count}"></span>
                    </td>
                    <td>
                        <a th:href="'/smart-money/'+${w.address}+'?chain='+${w.chainIndex}"
                           class="addr"
                           th:text="${#strings.substring(w.address,0,6)+'...'+#strings.substring(w.address,w.address.length()-4)}"></a>
                        <span class="chain-badge ms-1" th:classappend="'c-'+${w.chainIndex}"
                              th:text="${w.chainIndex=='1'?'ETH':w.chainIndex=='56'?'BSC':w.chainIndex=='8453'?'Base':'SOL'}"></span>
                    </td>
                    <td>
                        <span class="score-pill"
                              th:with="sc=${w.score!=null?w.score.doubleValue():0}"
                              th:classappend="${sc>=75?' s-high':sc>=50?' s-med':''}"
                              th:text="${w.score?:0}"></span>
                    </td>
                    <td th:with="wr=${w.winRate!=null?w.winRate.doubleValue():0}"
                        th:class="${wr>=0.5?'up fw-7':'dn'}"
                        th:text="${#numbers.formatDecimal(wr*100,1,1)+'%'}"></td>
                    <td th:with="pnl=${w.realizedPnlUsd!=null?w.realizedPnlUsd.doubleValue():0}">
                        <span th:class="${pnl>=0?'tag-up':'tag-dn'}"
                              th:text="${(pnl>=0?'▲ +$':'▼ $')+#numbers.formatDecimal(pnl<0?-pnl:pnl,1,0)}"></span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 实时信号 -->
    <div class="col-xl-6">
        <div class="card h-100">
            <div class="card-header">
                <span class="pulse-dot"></span>
                <span class="ms-2">实时买入信号</span>
                <span class="info-pill ms-2">Smart Money</span>
                <button class="btn-primary-g ms-auto" onclick="refreshIdx()" style="padding:5px 14px;font-size:.75rem">⚡ 刷新</button>
            </div>
            <div th:if="${recentSignals.isEmpty()}" class="empty-state">
                <div class="ei">📭</div>
                <div>点击刷新获取最新信号</div>
            </div>
            <table th:unless="${recentSignals.isEmpty()}" class="table" id="idx-sig-tbl">
                <thead><tr>
                    <th>时间</th><th>代币</th><th>链</th><th>买入金额</th><th>钱包数</th>
                </tr></thead>
                <tbody>
                <tr th:each="s : ${recentSignals}" class="sig-row">
                    <td class="mono t-dim" style="font-size:.7rem"
                        th:text="${#temporals.format(s.signalTime,'MM-dd HH:mm')}"></td>
                    <td>
                        <div class="fw-7" th:text="${s.tokenSymbol}"></div>
                        <div class="addr" style="font-size:.68rem"
                             th:text="${#strings.substring(s.tokenAddress,0,10)+'...'}"></div>
                    </td>
                    <td><span class="chain-badge" th:classappend="'c-'+${s.chainIndex}"
                              th:text="${s.chainIndex=='1'?'ETH':s.chainIndex=='56'?'BSC':s.chainIndex=='8453'?'Base':s.chainIndex=='501'?'SOL':s.chainIndex}"></span></td>
                    <td><span class="up fw-7" th:text="${'$'+#numbers.formatDecimal(s.amountUsd,1,0)}"></span></td>
                    <td><span class="tag-blue" th:text="${s.triggerWalletCount+' 🧠'}"></span></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
async function refreshIdx() {
    try {
        const r = await fetch('/api/signals?chain=1&walletType=1');
        const sigs = await r.json();
        if(!sigs.length) return;
        const tbody = document.querySelector('#idx-sig-tbl tbody');
        if(!tbody) return;
        sigs.slice(0,8).forEach(s => {
            const t = s.token||{};
            const ts = new Date().toLocaleString('zh-CN',{timeZone:'Asia/Shanghai',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
            const tr = document.createElement('tr');
            tr.className = 'sig-row';
            tr.innerHTML = `
                <td class="mono t-dim" style="font-size:.7rem">${ts}</td>
                <td><div class="fw-7">${t.symbol||'?'}</div><div class="addr" style="font-size:.68rem">${(t.tokenAddress||'').substring(0,10)}...</div></td>
                <td><span class="chain-badge c-1">ETH</span></td>
                <td><span class="up fw-7">$${parseFloat(s.amountUsd||0).toFixed(0)}</span></td>
                <td><span class="tag-blue">${s.triggerWalletCount||0} 🧠</span></td>`;
            tbody.prepend(tr);
        });
    } catch(e){}
}
</script>
</main></body>
</html>
