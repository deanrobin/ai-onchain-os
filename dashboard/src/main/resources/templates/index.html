<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: page('总览', ~{::main})}">
<body><main>

<!-- ── Top Stats ── -->
<div class="row g-3 mb-4">
    <div class="col-6 col-lg-3">
        <div class="stat-card sc-blue">
            <span class="sc-icon">🧠</span>
            <div class="sc-val" id="stat-wallets" th:text="${topWallets.size()}">0</div>
            <div class="sc-lbl">聪明钱追踪</div>
            <div class="mini-bar"><div class="mini-bar-fill" style="width:65%"></div></div>
        </div>
    </div>
    <div class="col-6 col-lg-3">
        <div class="stat-card sc-green">
            <span class="sc-icon">⚡</span>
            <div class="sc-val" id="stat-signals" th:text="${recentSignals.size()}">0</div>
            <div class="sc-lbl">今日信号</div>
            <div class="mini-bar"><div class="mini-bar-fill" style="width:42%;background:linear-gradient(90deg,var(--green),#34d399)"></div></div>
        </div>
    </div>
    <div class="col-6 col-lg-3">
        <div class="stat-card sc-purple">
            <span class="sc-icon">🔗</span>
            <div class="sc-val" style="font-size:.85rem;line-height:2.2;letter-spacing:0">
                <span class="chain-badge c-56">BSC</span>
                <span class="chain-badge c-501 ms-1">SOL</span>
            </div>
            <div class="sc-lbl">覆盖链</div>
        </div>
    </div>
    <!-- 实时币价 -->
    <div class="col-6 col-lg-3">
        <div class="stat-card sc-cyan">
            <span class="sc-icon">💹</span>
            <div id="price-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:3px 6px;position:relative;z-index:1">
                <div class="price-item" data-sym="BTC">
                    <span class="price-sym">BTC</span>
                    <span class="price-val">—</span>
                    <span class="price-chg"></span>
                </div>
                <div class="price-item" data-sym="ETH">
                    <span class="price-sym">ETH</span>
                    <span class="price-val">—</span>
                    <span class="price-chg"></span>
                </div>
                <div class="price-item" data-sym="BNB">
                    <span class="price-sym">BNB</span>
                    <span class="price-val">—</span>
                    <span class="price-chg"></span>
                </div>
                <div class="price-item" data-sym="SOL">
                    <span class="price-sym">SOL</span>
                    <span class="price-val">—</span>
                    <span class="price-chg"></span>
                </div>
            </div>
            <div class="sc-lbl" style="margin-top:8px">
                实时币价
                <span id="price-update-time" style="font-size:.6rem;font-weight:400;margin-left:4px">--</span>
            </div>
        </div>
    </div>
</div>

<!-- ── Main Grid ── -->
<div class="row g-3">

    <!-- 聪明钱 Top 20 -->
    <div class="col-xl-6">
        <div class="card h-100">
            <div class="card-header">
                🏆 聪明钱排行 <span id="rank-title">Top 20</span>
                <span class="info-pill ms-2">综合评分</span>
                <a href="/smart-money" class="btn-outline ms-auto" style="font-size:.75rem">全部 →</a>
            </div>
            <div id="wallet-list-wrap">
            <div th:if="${topWallets.isEmpty()}" class="empty-state">
                <div class="ei">🔍</div>
                <div>暂无数据</div>
            </div>
            <table th:unless="${topWallets.isEmpty()}" class="table" id="wallet-tbl">
                <thead><tr>
                    <th style="width:44px">#</th>
                    <th>钱包地址</th>
                    <th>评分</th>
                    <th>胜率</th>
                    <th>PnL</th>
                </tr></thead>
                <tbody>
                <tr th:each="w, st : ${topWallets}"
                    th:class="${st.count<=3 ? 'rank-'+st.count : ''}">
                    <td>
                        <span class="mono fw-7 t-dim"
                              th:text="${st.count==1?'🥇':st.count==2?'🥈':st.count==3?'🥉':'#'+st.count}"></span>
                    </td>
                    <td>
                        <a th:href="'/smart-money/'+${w.address}+'?chain='+${w.chainIndex}"
                           class="addr"
                           th:text="${#strings.substring(w.address,0,6)+'...'+#strings.substring(w.address,w.address.length()-4)}"></a>
                        <span class="chain-badge ms-1" th:classappend="'c-'+${w.chainIndex}"
                              th:text="${w.chainIndex=='56'?'BSC':'SOL'}"></span>
                    </td>
                    <td>
                        <span class="score-pill"
                              th:with="sc=${w.score!=null?w.score.doubleValue():0}"
                              th:classappend="${sc>=75?' s-high':sc>=50?' s-med':''}"
                              th:text="${w.score?:0}"></span>
                    </td>
                    <td th:with="wr=${w.winRate!=null?w.winRate.doubleValue():0}"
                        th:class="${wr>=0.5?'up fw-7':'dn'}"
                        th:text="${#numbers.formatDecimal(wr*100,1,1)+'%'}"></td>
                    <td th:with="pnl=${w.realizedPnlUsd!=null?w.realizedPnlUsd.doubleValue():0}">
                        <span th:class="${pnl>=0?'tag-up':'tag-dn'}"
                              th:text="${(pnl>=0?'▲ +$':'▼ $')+#numbers.formatDecimal(pnl<0?-pnl:pnl,1,0)}"></span>
                    </td>
                </tr>
                </tbody>
            </table>
            </div>
        </div>
    </div>

    <!-- 实时信号 -->
    <div class="col-xl-6">
        <div class="card h-100">
            <div class="card-header" style="flex-wrap:wrap;gap:6px">
                <span class="pulse-dot"></span>
                <span class="ms-1">实时买入信号</span>
                <!-- 平台选项卡 -->
                <div class="tab-row ms-2" style="background:#f8faff">
                    <div id="tab-gmgn"   class="tab-item active" onclick="setSigTab('gmgn')"
                         style="font-size:.72rem">GMGN</div>
                    <div id="tab-okx"    class="tab-item"        onclick="setSigTab('okx')"
                         style="font-size:.72rem">OKX</div>
                    <div id="tab-custom" class="tab-item"
                         style="font-size:.72rem;opacity:.45;cursor:not-allowed;pointer-events:auto"
                         title="敬请期待">自定义</div>
                </div>
                <!-- 刷新按钮 -->
                <button id="refresh-btn" class="btn-primary-g ms-auto"
                        onclick="manualRefresh()"
                        style="padding:5px 14px;font-size:.75rem;min-width:80px">⚡ 刷新</button>
            </div>
            <div id="sig-wrap">
            <div th:if="${recentSignals.isEmpty()}" class="empty-state">
                <div class="ei">📭</div>
                <div>暂无信号</div>
            </div>
            <table th:unless="${recentSignals.isEmpty()}" class="table" id="idx-sig-tbl">
                <thead><tr>
                    <th>时间</th>
                    <th>代币 <span style="font-size:.62rem;color:var(--t3);font-weight:400">↗点击交易</span></th>
                    <th>链</th><th>买入额</th>
                    <th>市值</th>
                    <th>信号价</th>
                    <th>🧠</th>
                </tr></thead>
                <tbody id="sig-tbody">
                <tr th:each="s : ${recentSignals}" class="sig-row">
                    <td class="mono t-dim" style="font-size:.7rem"
                        th:text="${#temporals.format(s.signalTime,'MM-dd HH:mm')}"></td>
                    <td>
                        <div class="fw-7 sig-token-link"
                             style="cursor:pointer;color:var(--blue)"
                             th:attr="data-addr=${s.tokenAddress},data-chain=${s.chainIndex}"
                             onclick="openTrade(this)"
                             th:text="${s.tokenSymbol}"></div>
                        <div class="addr sig-token-link"
                             style="font-size:.65rem;cursor:pointer"
                             th:attr="data-addr=${s.tokenAddress},data-chain=${s.chainIndex}"
                             onclick="openTrade(this)"
                             th:text="${#strings.substring(s.tokenAddress,0,10)+'...'}"></div>
                    </td>
                    <td><span class="chain-badge" th:classappend="'c-'+${s.chainIndex}"
                              th:text="${s.chainIndex=='56'?'BSC':s.chainIndex=='501'?'SOL':s.chainIndex}"></span></td>
                    <td><span class="up fw-7" style="font-size:.82rem"
                              th:text="${'$'+#numbers.formatDecimal(s.amountUsd,1,0)}"></span></td>
                    <!-- 市值：data-mc 存 raw 值，页面加载后 JS 格式化 -->
                    <td class="mono t-dim mc-cell" style="font-size:.76rem"
                        th:attr="data-mc=${s.marketCapUsd!=null?s.marketCapUsd:0}">
                    </td>
                    <!-- 信号时价格 -->
                    <td class="mono" style="font-size:.76rem"
                        th:with="p=${s.priceAtSignal!=null?s.priceAtSignal.doubleValue():0}"
                        th:text="${p>0?(p>=1?'$'+#numbers.formatDecimal(p,1,4):'$'+p):'—'}">
                    </td>
                    <td><span class="tag-blue" style="font-size:.72rem"
                              th:text="${s.triggerWalletCount}"></span></td>
                </tr>
                </tbody>
            </table>
            </div>
        </div>
    </div>
</div>



<script>
// ───────────── 数据刷新逻辑 ─────────────

async function refreshAll() {
    await Promise.all([refreshWallets(), refreshSignals()]);
}

async function refreshWallets() {
    try {
        const r = await fetch('/api/wallets?limit=20');
        const wallets = await r.json();
        if (!wallets || !wallets.length) return;
        document.getElementById('stat-wallets').textContent = wallets.length;
        const medals = ['🥇','🥈','🥉'];
        const tbody = document.querySelector('#wallet-tbl tbody');
        if (!tbody) return;
        tbody.innerHTML = wallets.slice(0,20).map((w,i) => {
            const rank = i < 3 ? medals[i] : '#'+(i+1);
            const addr = w.address || '';
            const short = addr.length > 10 ? addr.substring(0,6)+'...'+addr.slice(-4) : addr;
            const chain = w.chainIndex==='56'?'BSC':'SOL';
            const sc = parseFloat(w.score||0);
            const pillCls = sc>=75?'score-pill s-high':sc>=50?'score-pill s-med':'score-pill';
            const wr = parseFloat(w.winRate||0);
            const wrCls = wr>=0.5?'up fw-7':'dn';
            const pnl = parseFloat(w.realizedPnlUsd||0);
            const pnlCls = pnl>=0?'tag-up':'tag-dn';
            const pnlTxt = (pnl>=0?'▲ +$':'▼ $')+Math.abs(pnl).toLocaleString('en',{maximumFractionDigits:0});
            return `<tr class="${i<3?'rank-'+(i+1):''}">
                <td><span class="mono fw-7 t-dim">${rank}</span></td>
                <td><a href="/smart-money/${addr}?chain=${w.chainIndex}" class="addr">${short}</a>
                    <span class="chain-badge ms-1 c-${w.chainIndex}">${chain}</span></td>
                <td><span class="${pillCls}">${sc.toFixed(1)}</span></td>
                <td class="${wrCls}">${(wr*100).toFixed(1)}%</td>
                <td><span class="${pnlCls}">${pnlTxt}</span></td>
            </tr>`;
        }).join('');
    } catch(e){ console.warn('refreshWallets', e); }
}

async function refreshSignals() {
    try {
        const r = await fetch('/api/signals/db?limit=20');
        const sigs = await r.json();
        if (!sigs || !sigs.length) return;
        document.getElementById('stat-signals').textContent = sigs.length;
        const tbody = document.getElementById('sig-tbody');
        if (!tbody) return;
        tbody.innerHTML = sigs.map(s => {
            const addr = s.tokenAddress || '';
            const chain = s.chainIndex==='56'?'BSC':s.chainIndex==='501'?'SOL':s.chainIndex;
            const ts = s.signalTimeStr || '';
            const mcStr = fmtMcap(s.marketCapUsd);
            const pr  = parseFloat(s.priceAtSignal||0);
            const prStr = pr>0 ? (pr>=1 ? '$'+pr.toFixed(4) : '$'+pr.toPrecision(4)) : '—';
            return `<tr class="sig-row">
                <td class="mono t-dim" style="font-size:.7rem">${ts}</td>
                <td>
                    <div class="fw-7 sig-token-link" style="cursor:pointer;color:var(--blue)"
                         data-addr="${addr}" data-chain="${s.chainIndex}" onclick="openTrade(this)">${s.tokenSymbol||'?'}</div>
                    <div class="addr sig-token-link" style="font-size:.65rem;cursor:pointer"
                         data-addr="${addr}" data-chain="${s.chainIndex}" onclick="openTrade(this)">${addr.substring(0,10)}...</div>
                </td>
                <td><span class="chain-badge c-${s.chainIndex}">${chain}</span></td>
                <td><span class="up fw-7" style="font-size:.82rem">$${parseFloat(s.amountUsd||0).toLocaleString('en',{maximumFractionDigits:0})}</span></td>
                <td class="mono t-dim" style="font-size:.76rem">${mcStr}</td>
                <td class="mono" style="font-size:.76rem">${prStr}</td>
                <td><span class="tag-blue" style="font-size:.72rem">${s.triggerWalletCount||0}</span></td>
            </tr>`;
        }).join('');
    } catch(e){ console.warn('refreshSignals', e); }
}

// 服务端渲染的 mc-cell 格式化（Thymeleaf 输出 raw 数值）
document.querySelectorAll('.mc-cell[data-mc]').forEach(td => {
    td.textContent = fmtMcap(td.dataset.mc);
});

// ───────────── 价格展示 ─────────────

async function refreshPrices() {
    try {
        const r = await fetch('/api/prices');
        const list = await r.json();
        if (!list || !list.length) return;
        list.forEach(p => {
            const item = document.querySelector(`#price-grid .price-item[data-sym="${p.symbol}"]`);
            if (!item) return;
            const price = parseFloat(p.priceUsd || 0);
            const chg   = parseFloat(p.change24h || 0);
            const priceStr = price >= 1000
                ? '$' + price.toLocaleString('en', {maximumFractionDigits: 0})
                : '$' + price.toLocaleString('en', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            item.querySelector('.price-val').textContent = priceStr;
            item.querySelector('.price-val').style.color = '';
            const chgEl = item.querySelector('.price-chg');
            if (chgEl) {
                chgEl.textContent = (chg >= 0 ? '▲' : '▼') + Math.abs(chg).toFixed(2) + '%';
                chgEl.style.color = chg >= 0 ? 'var(--green)' : 'var(--red)';
            }
        });
        const now = new Date().toLocaleString('zh-CN', {timeZone:'Asia/Shanghai', hour:'2-digit', minute:'2-digit', second:'2-digit'});
        const el = document.getElementById('price-update-time');
        if (el) el.textContent = now;
    } catch(e) { console.warn('refreshPrices', e); }
}

// 启动时立即拉价格，然后每 30 秒刷新一次
refreshPrices();
setInterval(refreshPrices, 30000);

// ───────────── 平台选项卡 ─────────────

let sigTab = 'gmgn'; // 默认 GMGN

function setSigTab(tab) {
    if (tab === 'custom') return; // 自定义不可用
    sigTab = tab;
    ['gmgn','okx','custom'].forEach(t => {
        const el = document.getElementById('tab-'+t);
        if (!el) return;
        el.classList.toggle('active', t === tab);
    });
}

function tradeUrl(addr, chain, tab) {
    const isSol = chain === '501';
    if (tab === 'gmgn') {
        return isSol
            ? `https://gmgn.ai/sol/token/${addr}`
            : `https://gmgn.ai/bsc/token/${addr}`;
    }
    if (tab === 'okx') {
        // OKX Web3 行情页：chain 用 bsc/solana（经过重定向验证）
        return isSol
            ? `https://web3.okx.com/zh-hans/token/solana/${addr}`
            : `https://web3.okx.com/zh-hans/token/bsc/${addr}`;
    }
    return '#';
}

function openTrade(el) {
    const addr  = el.dataset.addr;
    const chain = el.dataset.chain;
    const url   = tradeUrl(addr, chain, sigTab);
    if (url && url !== '#') window.open(url, '_blank', 'noopener');
}

// ───────────── 手动刷新 + 5 秒冷却 ─────────────

let refreshCooldown = false;
let cooldownTimer = null;

function manualRefresh() {
    if (refreshCooldown) return;
    refreshCooldown = true;
    const btn = document.getElementById('refresh-btn');
    let secs = 5;
    btn.disabled = true;
    btn.style.opacity = '0.45';
    btn.style.cursor = 'not-allowed';
    btn.textContent = `⏳ ${secs}s`;
    cooldownTimer = setInterval(() => {
        secs--;
        if (secs <= 0) {
            clearInterval(cooldownTimer);
            refreshCooldown = false;
            btn.disabled = false;
            btn.style.opacity = '1';
            btn.style.cursor = '';
            btn.textContent = '⚡ 刷新';
        } else {
            btn.textContent = `⏳ ${secs}s`;
        }
    }, 1000);
    refreshAll();
    resetCountdown(); // 手动刷新后重置自动刷新倒计时
}

// ───────────── 60 秒自动刷新 ─────────────

let autoSeconds = 60;
let countdownTimer = null;

function resetCountdown() {
    autoSeconds = 60;
    updateCountdownBadge(autoSeconds);
}

function updateCountdownBadge(s) {
    const el = document.getElementById('nav-countdown');
    if (el) el.textContent = s;
}

function startAutoRefresh() {
    // 显示 nav-bar 里的倒计时徽章（仅首页）
    const badge = document.getElementById('nav-refresh-badge');
    if (badge) badge.style.display = 'inline-block';

    countdownTimer = setInterval(() => {
        autoSeconds--;
        updateCountdownBadge(autoSeconds);
        if (autoSeconds <= 0) {
            autoSeconds = 60;
            updateCountdownBadge(autoSeconds);
            refreshAll();
        }
    }, 1000);
}

// 启动
startAutoRefresh();
</script>
</main></body>
</html>
