<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: page('聪明钱', ~{::main})}">
<body><main>

<!-- Filter bar -->
<div class="d-flex flex-wrap align-items-center gap-3 mb-4">
    <div class="tab-row" id="chainTabs">
        <div class="tab-item active" data-chain="1"    onclick="selChain(this)">🔷 ETH</div>
        <div class="tab-item"        data-chain="56"   onclick="selChain(this)">🟡 BSC</div>
        <div class="tab-item"        data-chain="8453" onclick="selChain(this)">🔵 Base</div>
        <div class="tab-item"        data-chain="501"  onclick="selChain(this)">🟣 SOL</div>
    </div>
    <div class="tab-row" id="wtTabs">
        <div class="tab-item active" data-wt="1" onclick="selWt(this)">🧠 Smart Money</div>
        <div class="tab-item"        data-wt="2" onclick="selWt(this)">🎤 KOL</div>
        <div class="tab-item"        data-wt="3" onclick="selWt(this)">🐋 Whale</div>
    </div>
    <button class="btn-primary-g" onclick="fetchSignals()">⚡ 获取信号</button>
    <span id="sig-status" class="info-pill" style="display:none"></span>
</div>

<div class="row g-3">

    <!-- 实时信号 -->
    <div class="col-xl-7">
        <div class="card">
            <div class="card-header">
                <span class="pulse-dot"></span>
                <span class="ms-2">实时买入信号</span>
                <span class="t-dim ms-1" style="font-size:.72rem;font-weight:400" id="sig-chain-lbl">· ETH</span>
            </div>
            <table class="table" id="sig-tbl">
                <thead><tr>
                    <th>代币</th><th>市值</th><th>买入金额</th><th>触发钱包数</th><th>已卖出</th><th></th>
                </tr></thead>
                <tbody id="sig-body">
                <tr th:each="s : ${liveSignals}" class="sig-row">
                    <td>
                        <div class="d-flex align-items-center gap-2">
                            <img th:if="${s.token?.logo}" th:src="${s.token.logo}"
                                 class="token-logo" onerror="this.style.display='none'">
                            <div>
                                <div class="fw-7" th:text="${s.token?.symbol?:'?'}"></div>
                                <div class="addr" style="font-size:.68rem"
                                     th:text="${#strings.substring(s.token?.tokenAddress?:'',0,10)+'...'}"></div>
                            </div>
                        </div>
                    </td>
                    <td class="mono t-muted" style="font-size:.78rem"
                        th:text="${s.token?.marketCapUsd!=null?('$'+#numbers.formatDecimal(T(java.lang.Double).parseDouble(''+s.token.marketCapUsd),1,0)):'—'}"></td>
                    <td><span class="up fw-7"
                              th:text="${'$'+#numbers.formatDecimal(T(java.lang.Double).parseDouble(''+s.amountUsd),1,0)}"></span></td>
                    <td><span class="tag-blue" th:text="${(s.triggerWalletCount?:0)+' 🧠'}"></span></td>
                    <td>
                        <span th:if="${s.soldRatioPercent!=null}"
                              th:with="sr=${T(java.lang.Double).parseDouble(''+s.soldRatioPercent)}"
                              th:class="${sr>50?'dn':'up'}"
                              th:text="${#numbers.formatDecimal(sr,1,1)+'%'}"></span>
                        <span th:unless="${s.soldRatioPercent!=null}" class="t-dim">—</span>
                    </td>
                    <td><a href="https://www.okx.com/zh-hans/web3/dex/swap" class="btn-green-o" target="_blank">跟单 ↗</a></td>
                </tr>
                <tr th:if="${liveSignals.isEmpty()}" id="no-sig">
                    <td colspan="6" class="empty-state">
                        <div class="ei">🔭</div><div>点击「获取信号」</div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 聪明钱排行 -->
    <div class="col-xl-5">
        <div class="card">
            <div class="card-header">🏆 聪明钱排行榜</div>
            <div th:if="${topWallets.isEmpty()}" class="empty-state">
                <div class="ei">📋</div>
                <div>运行 <code style="color:var(--blue)">python main.py all</code></div>
            </div>
            <table th:unless="${topWallets.isEmpty()}" class="table">
                <thead><tr>
                    <th style="width:44px">#</th>
                    <th>地址</th><th>评分</th><th>胜率</th><th>PnL</th>
                </tr></thead>
                <tbody>
                <tr th:each="w, st : ${topWallets}"
                    th:class="${st.count<=3?'rank-'+st.count:''}">
                    <td class="mono fw-7 t-dim"
                        th:text="${st.count==1?'🥇':st.count==2?'🥈':st.count==3?'🥉':'#'+st.count}"></td>
                    <td>
                        <a th:href="'/smart-money/'+${w.address}+'?chain='+${w.chainIndex}"
                           class="addr"
                           th:text="${#strings.substring(w.address,0,6)+'...'+#strings.substring(w.address,w.address.length()-4)}"></a>
                        <span class="chain-badge ms-1" th:classappend="'c-'+${w.chainIndex}"
                              th:text="${w.chainIndex=='1'?'ETH':w.chainIndex=='56'?'BSC':w.chainIndex=='8453'?'Base':'SOL'}"></span>
                    </td>
                    <td><span class="score-pill"
                              th:with="sc=${w.score!=null?w.score.doubleValue():0}"
                              th:classappend="${sc>=75?' s-high':sc>=50?' s-med':''}"
                              th:text="${w.score?:0}"></span></td>
                    <td th:with="wr=${w.winRate!=null?w.winRate.doubleValue():0}"
                        th:class="${wr>=0.5?'up fw-7':'dn'}"
                        th:text="${#numbers.formatDecimal(wr*100,1,1)+'%'}"></td>
                    <td th:with="pnl=${w.realizedPnlUsd!=null?w.realizedPnlUsd.doubleValue():0}">
                        <span th:class="${pnl>=0?'tag-up':'tag-dn'}"
                              th:text="${(pnl>=0?'▲ +$':'▼ $')+#numbers.formatDecimal(pnl<0?-pnl:pnl,1,0)}"></span></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
let curChain='1', curWt='1';
function selChain(el){
    $$('#chainTabs .tab-item').forEach(e=>e.classList.remove('active'));
    el.classList.add('active'); curChain=el.dataset.chain;
    const m={'1':'ETH','56':'BSC','8453':'Base','501':'SOL'};
    document.getElementById('sig-chain-lbl').textContent='· '+(m[curChain]||curChain);
}
function selWt(el){
    $$('#wtTabs .tab-item').forEach(e=>e.classList.remove('active'));
    el.classList.add('active'); curWt=el.dataset.wt;
}
async function fetchSignals(){
    const st=document.getElementById('sig-status');
    st.style.display='inline-flex'; st.textContent='⏳ 加载中...';
    try{
        const r=await fetch(`/api/signals?chain=${curChain}&walletType=${curWt}`);
        const sigs=await r.json();
        const tbody=document.getElementById('sig-body');
        if(!sigs.length){
            tbody.innerHTML='<tr><td colspan="6" class="empty-state"><div class="ei">🔭</div><div>暂无信号</div></td></tr>';
            st.textContent='— 暂无信号'; return;
        }
        tbody.innerHTML=sigs.map(s=>{
            const t=s.token||{};
            const mc=t.marketCapUsd?fmtUsd(t.marketCapUsd):'—';
            const sold=s.soldRatioPercent!=null
                ?`<span class="${parseFloat(s.soldRatioPercent)>.5?'dn':'up'}">${(parseFloat(s.soldRatioPercent)*100).toFixed(1)}%</span>`
                :'<span class="t-dim">—</span>';
            return `<tr class="sig-row">
                <td><div class="d-flex align-items-center gap-2">
                    ${t.logo?`<img src="${t.logo}" class="token-logo" onerror="this.style.display='none'">` :''}
                    <div><div class="fw-7">${t.symbol||'?'}</div>
                    <div class="addr" style="font-size:.68rem">${(t.tokenAddress||'').substring(0,10)}...</div></div>
                </div></td>
                <td class="mono t-muted" style="font-size:.78rem">${mc}</td>
                <td><span class="up fw-7">${fmtUsd(s.amountUsd||0)}</span></td>
                <td><span class="tag-blue">${s.triggerWalletCount||0} 🧠</span></td>
                <td>${sold}</td>
                <td><a href="https://www.okx.com/zh-hans/web3/dex/swap" class="btn-green-o" target="_blank">跟单 ↗</a></td>
            </tr>`;
        }).join('');
        st.textContent=`✅ ${sigs.length} 条 · ${new Date().toLocaleTimeString('zh-CN',{timeZone:'Asia/Shanghai'})}`;
    }catch(e){st.textContent='❌ 加载失败';}
}
</script>
</main></body>
</html>
