<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: page('钱包详情', ~{::main})}">
<body><main>

<!-- ── Header ── -->
<div class="d-flex align-items-center flex-wrap gap-3 mb-4">
    <a href="/smart-money" class="btn-outline">← 返回</a>
    <span>🧠</span>
    <span class="addr" style="font-size:.88rem" th:text="${address}"
          th:attr="onclick='copyAddr(\''+${address}+'\')'"></span>
    <button class="btn-outline" style="font-size:.72rem;padding:3px 8px"
            th:attr="onclick='copyAddr(\''+${address}+'\')'">📋 复制</button>
    <span class="chain-badge" th:classappend="'c-'+${chain}" th:text="${chainName}"></span>
    <!-- Time Frame -->
    <div class="tab-row">
        <div class="tab-item" th:classappend="${timeFrame=='1'?' active':''}"
             th:attr="data-href='?chain='+${chain}+'&amp;timeFrame=1'"
             onclick="window.location.href=this.dataset.href">1D</div>
        <div class="tab-item" th:classappend="${timeFrame=='2'?' active':''}"
             th:attr="data-href='?chain='+${chain}+'&amp;timeFrame=2'"
             onclick="window.location.href=this.dataset.href">3D</div>
        <div class="tab-item" th:classappend="${timeFrame=='3'?' active':''}"
             th:attr="data-href='?chain='+${chain}+'&amp;timeFrame=3'"
             onclick="window.location.href=this.dataset.href">7D</div>

    </div>
</div>

<!-- ── Overview Stats ── -->
<div th:if="${hasOverview}" class="row g-3 mb-4">
    <div class="col-6 col-md-4 col-xl-2">
        <div class="stat-card" th:classappend="${ov.winRateGood?'sc-green':'sc-red'}">
            <div class="sc-icon">🎯</div>
            <div th:class="${'sc-val '+(ov.winRateGood?'up':'dn')}"
                 th:text="${ov.winRatePct}"></div>
            <div class="sc-lbl">胜率</div>
        </div>
    </div>
    <div class="col-6 col-md-4 col-xl-2">
        <div class="stat-card" th:classappend="${ov.pnlPositive?'sc-green':'sc-red'}">
            <div class="sc-icon">💰</div>
            <div th:class="${'sc-val '+(ov.pnlPositive?'up':'dn')}"
                 th:text="${ov.pnlDisplay}"></div>
            <div class="sc-lbl">已实现盈亏</div>
        </div>
    </div>
    <div class="col-6 col-md-4 col-xl-2">
        <div class="stat-card sc-yellow">
            <div class="sc-icon">🏆</div>
            <div class="sc-val t-yellow" th:text="${ov.top3Display}"></div>
            <div class="sc-lbl">Top3 盈利</div>
        </div>
    </div>
    <div class="col-6 col-md-4 col-xl-2">
        <div class="stat-card sc-blue">
            <div class="sc-icon">📊</div>
            <div class="sc-val t-blue" th:text="${ov.txCountDisplay}"></div>
            <div class="sc-lbl">买 / 卖次数</div>
        </div>
    </div>
    <div class="col-6 col-md-4 col-xl-2">
        <div class="stat-card sc-cyan">
            <div class="sc-icon">💵</div>
            <div class="sc-val t-cyan" th:text="${ov.avgBuyDisplay}"></div>
            <div class="sc-lbl">平均买入</div>
        </div>
    </div>
    <div class="col-6 col-md-4 col-xl-2">
        <div class="stat-card sc-purple">
            <div class="sc-icon">📌</div>
            <div class="sc-val t-purple" style="font-size:.9rem"
                 th:text="${ov.preferredMarketCap}"></div>
            <div class="sc-lbl">偏好市值</div>
        </div>
    </div>
</div>

<!-- ── 盈亏分布 ── -->
<div th:if="${ov.hasPnlDist}" class="card mb-3">
    <div class="card-header">📊 代币盈亏分布</div>
    <div class="card-body">
        <div class="row g-3 text-center">
            <div class="col-3">
                <div class="tag-up" style="display:inline-block;margin-bottom:8px">🚀 超+500%</div>
                <div style="font-size:1.8rem;font-weight:800;color:var(--green)"
                     th:text="${ov.over500}"></div>
            </div>
            <div class="col-3">
                <div class="tag-up" style="display:inline-block;margin-bottom:8px">📈 0~+500%</div>
                <div style="font-size:1.8rem;font-weight:800;color:#10b981"
                     th:text="${ov.zero500}"></div>
            </div>
            <div class="col-3">
                <div style="display:inline-block;margin-bottom:8px;background:var(--orange-l);color:var(--orange);border:1px solid rgba(249,115,22,.2);padding:2px 10px;border-radius:20px;font-size:.78rem;font-weight:700">📉 -50%~0</div>
                <div style="font-size:1.8rem;font-weight:800;color:var(--orange)"
                     th:text="${ov.zeroMinus50}"></div>
            </div>
            <div class="col-3">
                <div class="tag-dn" style="display:inline-block;margin-bottom:8px">💥 超-50%</div>
                <div style="font-size:1.8rem;font-weight:800;color:var(--red)"
                     th:text="${ov.overMinus50}"></div>
            </div>
        </div>
    </div>
</div>

<!-- ── Top3 代币 ── -->
<div th:if="${ov.topTokens != null and !ov.topTokens.isEmpty()}" class="row g-3 mb-3">
    <div class="col-md-4" th:each="t : ${ov.topTokens}">
        <div class="stat-card" th:classappend="${t.cardClass}">
            <div style="font-size:.72rem;color:var(--t3);margin-bottom:6px" th:text="${t.medal}"></div>
            <div class="fw-8" style="font-size:1.1rem;margin-bottom:4px" th:text="${t.symbol}"></div>
            <div th:class="${'fw-8 '+(t.positive?'up':'dn')}"
                 style="font-size:1.25rem" th:text="${t.pnlDisplay}"></div>
            <div th:class="${t.positive?'up':'dn'}"
                 style="font-size:.8rem" th:text="${t.pctDisplay}"></div>
        </div>
    </div>
</div>

<!-- ── 最近交易记录 ── -->
<div class="card mb-3">
    <div class="card-header">
        📋 最近交易记录
        <span class="info-pill ms-2">倒序 · 最近 30 笔</span>
        <button class="btn-outline ms-auto" onclick="loadMoreTx()" id="load-more-btn">⬇ 加载更多</button>
    </div>
    <div th:if="${txList.isEmpty()}" class="empty-state">
        <div class="ei">📭</div><div>暂无交易记录</div>
    </div>
    <table th:unless="${txList.isEmpty()}" class="table" id="tx-table">
        <thead>
            <tr>
                <th>时间 (UTC+8)</th><th>类型</th><th>代币</th>
                <th>数量</th><th>方向</th><th>状态</th><th>TxHash</th>
            </tr>
        </thead>
        <tbody id="tx-tbody">
            <tr th:each="tx : ${txList}">
                <td class="mono t-dim" style="font-size:.72rem;white-space:nowrap"
                    th:text="${tx.displayTime}"></td>
                <td><span class="tag-gray" style="font-size:.72rem" th:text="${tx.typeLabel}"></span></td>
                <td class="fw-7" th:text="${tx.symbol}"></td>
                <td class="mono" style="font-size:.78rem" th:text="${tx.amount}"></td>
                <td>
                    <span th:if="${tx.incoming}" class="tag-up">📥 收入</span>
                    <span th:unless="${tx.incoming}" class="tag-dn">📤 支出</span>
                </td>
                <td>
                    <span th:if="${tx.success}" class="up">✅ 成功</span>
                    <span th:unless="${tx.success}" class="dn">❌ 失败</span>
                </td>
                <td>
                    <a th:href="${tx.explorerUrl}" th:text="${tx.txHashShort}"
                       class="addr" target="_blank"></a>
                </td>
            </tr>
        </tbody>
    </table>
</div>

<!-- ── PnL 明细（懒加载） ── -->
<div class="card">
    <div class="card-header">
        🪙 代币 PnL 明细
        <button class="btn-primary-g ms-auto" onclick="loadPnl()"
                style="padding:5px 14px;font-size:.78rem">📊 加载 PnL</button>
    </div>
    <div id="pnl-wrap">
        <div class="empty-state"><div class="ei">📊</div><div>点击「加载 PnL」</div></div>
    </div>
</div>

<script th:inline="javascript">
const ADDR     = /*[[${address}]]*/ '';
const CHAIN    = /*[[${chain}]]*/ '56';
const EXPLORER = /*[[${explorer}]]*/ '';

function fmtTs(ts) {
    if (!ts) return '—';
    return new Date(parseInt(ts)).toLocaleString('zh-CN', {
        timeZone:'Asia/Shanghai', month:'2-digit', day:'2-digit',
        hour:'2-digit', minute:'2-digit', second:'2-digit'
    });
}

let txOffset = 30;
async function loadMoreTx() {
    const btn = document.getElementById('load-more-btn');
    btn.textContent = '⏳ 加载中...';
    try {
        const r = await fetch(`/api/portfolio/txs?address=${ADDR}&chains=${CHAIN}&limit=30&offset=${txOffset}`);
        const d = await r.json();
        const txs = d.transactions || [];
        if (!txs.length) { btn.textContent = '✅ 没有更多了'; btn.disabled = true; return; }
        const tbody = document.getElementById('tx-tbody');
        txs.forEach(tx => {
            const toList = Array.isArray(tx.to) ? tx.to : [];
            const toAddr = (toList[0]?.address || '').toLowerCase();
            const isIn = toAddr.includes(ADDR.toLowerCase());
            const typeLbl = tx.itype==='2'?'Token转账':tx.itype==='0'?'主链币':'合约调用';
            const hash = tx.txHash || '';
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="mono t-dim" style="font-size:.72rem;white-space:nowrap">${fmtTs(tx.txTime)}</td>
                <td><span class="tag-gray" style="font-size:.72rem">${typeLbl}</span></td>
                <td class="fw-7">${tx.symbol||'—'}</td>
                <td class="mono" style="font-size:.78rem">${tx.amount||'—'}</td>
                <td>${isIn?'<span class="tag-up">📥 收入</span>':'<span class="tag-dn">📤 支出</span>'}</td>
                <td>${tx.txStatus==='success'?'<span class="up">✅ 成功</span>':'<span class="dn">❌ 失败</span>'}</td>
                <td><a href="${EXPLORER}${hash}" class="addr" target="_blank">${hash.substring(0,12)}...</a></td>`;
            tbody.appendChild(tr);
        });
        txOffset += txs.length;
        btn.textContent = '⬇ 加载更多';
    } catch(e) { btn.textContent = '❌ 失败，重试'; }
}

async function loadPnl() {
    const wrap = document.getElementById('pnl-wrap');
    wrap.innerHTML = '<div class="empty-state"><div class="ei">⏳</div><div>加载中...</div></div>';
    const r = await fetch(`/api/portfolio/pnl?address=${ADDR}&chain=${CHAIN}&limit=50`);
    const data = await r.json();
    // 过滤掉持仓价值 < 1U 的代币（垃圾仓/灰尘）
    const filtered = data.filter(p => parseFloat(p.tokenBalanceUsd || 0) >= 1);
    if (!filtered.length) { wrap.innerHTML='<div class="empty-state"><div class="ei">📭</div><div>暂无数据</div></div>'; return; }
    const data_= filtered;
    wrap.innerHTML = `<table class="table"><thead><tr>
        <th>代币</th><th>持仓价值</th><th>浮盈浮亏</th><th>已实现</th>
        <th>总盈亏</th><th>买入均价</th><th>卖出均价</th><th>买次</th><th>状态</th>
    </tr></thead><tbody>${data_.map(p => {
        const isClosed = p.unrealizedPnlUsd === 'SELL_ALL' || p.unrealizedPnlUsd === null;
        const un = isClosed ? '<span class="tag-gray">✅ 已清仓</span>'
            : (() => { const v=parseFloat(p.unrealizedPnlUsd||0), pct=parseFloat(p.unrealizedPnlPercent||0)*100;
                return `<span class="${v>=0?'up':'dn'} fw-7">${v>=0?'▲ +$':'▼ $'}${Math.abs(v).toFixed(2)}</span>
                <div style="font-size:.7rem" class="${pct>=0?'up':'dn'}">${pct>=0?'+':''}${pct.toFixed(1)}%</div>`; })();
        const re=parseFloat(p.realizedPnlUsd||0), tot=parseFloat(p.totalPnlUsd||0);
        return `<tr>
            <td class="fw-7">${p.tokenSymbol||'?'}</td>
            <td class="mono" style="font-size:.8rem">$${parseFloat(p.tokenBalanceUsd||0).toFixed(2)}</td>
            <td>${un}</td>
            <td class="${re>=0?'up':'dn'}">${re>=0?'+$':'-$'}${Math.abs(re).toFixed(2)}</td>
            <td><span class="${tot>=0?'tag-up':'tag-dn'}">${tot>=0?'▲ +$':'▼ $'}${Math.abs(tot).toFixed(2)}</span></td>
            <td class="mono t-dim" style="font-size:.77rem">$${p.buyAvgPrice||'—'}</td>
            <td class="mono t-dim" style="font-size:.77rem">$${p.sellAvgPrice||'—'}</td>
            <td>${p.buyTxCount||0}</td>
            <td><span style="font-size:.72rem;color:${isClosed?'var(--t3)':'var(--green)'}">${isClosed?'已平仓':'● 持仓中'}</span></td>
        </tr>`;
    }).join('')}</tbody></table>`;
}
</script>
</main></body>
</html>
