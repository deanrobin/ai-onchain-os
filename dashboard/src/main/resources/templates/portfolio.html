<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: page('我的持仓', ~{::main})}">
<body><main>

<div th:if="${!hasAddresses}" class="alert alert-warning">
    <i class="bi bi-exclamation-triangle me-2"></i>
    请先在数据库 <code>my_address</code> 表中添加你的钱包地址：
    <pre class="mt-2 bg-dark p-2 rounded">INSERT INTO my_address (address, chain_index, label) VALUES ('0xYourAddress', '1', 'Main Wallet');</pre>
</div>

<div th:each="entry : ${portfolioData}" class="mb-4">
    <!-- 地址标题 -->
    <div class="d-flex align-items-center mb-2 gap-2">
        <span class="badge badge-chain" th:classappend="'chain-'+${entry.chainIndex}"
              th:text="${entry.chainIndex=='1'?'ETH':entry.chainIndex=='56'?'BSC':entry.chainIndex=='8453'?'Base':entry.chainIndex}"></span>
        <strong th:text="${entry.label}"></strong>
        <code class="text-muted" style="font-size:0.8rem" th:text="${entry.address}"></code>
    </div>

    <!-- 概览 Stats -->
    <div th:if="${entry.overview != null and !entry.overview.isEmpty()}" class="row g-2 mb-3">
        <div class="col-6 col-md-2">
            <div class="card stat-card text-center">
                <div class="stat-label">胜率 (7D)</div>
                <div class="stat-value"
                     th:text="${entry.overview.winRate != null ? #numbers.formatDecimal(entry.overview.winRate * 100, 1, 1) + '%' : '-'}"></div>
            </div>
        </div>
        <div class="col-6 col-md-2">
            <div class="card stat-card text-center">
                <div class="stat-label">已实现盈亏</div>
                <div class="stat-value"
                     th:class="${'stat-value ' + (entry.overview.realizedPnlUsd != null and entry.overview.realizedPnlUsd >= 0 ? 'pnl-pos' : 'pnl-neg')}"
                     th:text="${entry.overview.realizedPnlUsd != null ? '$' + #numbers.formatDecimal(entry.overview.realizedPnlUsd, 1, 0) : '-'}"></div>
            </div>
        </div>
        <div class="col-6 col-md-2">
            <div class="card stat-card text-center">
                <div class="stat-label">买入次数</div>
                <div class="stat-value" th:text="${entry.overview.buyTxCount ?: '-'}"></div>
            </div>
        </div>
        <div class="col-6 col-md-2">
            <div class="card stat-card text-center">
                <div class="stat-label">卖出次数</div>
                <div class="stat-value" th:text="${entry.overview.sellTxCount ?: '-'}"></div>
            </div>
        </div>
        <div class="col-6 col-md-2">
            <div class="card stat-card text-center">
                <div class="stat-label">Top3代币盈亏</div>
                <div class="stat-value text-warning"
                     th:text="${entry.overview.top3PnlTokenSumUsd != null ? '$' + #numbers.formatDecimal(entry.overview.top3PnlTokenSumUsd, 1, 0) : '-'}"></div>
            </div>
        </div>
        <div class="col-6 col-md-2">
            <div class="card stat-card text-center">
                <div class="stat-label">平均买入</div>
                <div class="stat-value"
                     th:text="${entry.overview.avgBuyValueUsd != null ? '$' + #numbers.formatDecimal(entry.overview.avgBuyValueUsd, 1, 0) : '-'}"></div>
            </div>
        </div>
    </div>

    <!-- 持仓 PnL 列表 -->
    <div class="card">
        <div class="card-header">
            <i class="bi bi-wallet2 me-2"></i>持仓代币 & PnL
            <button class="btn btn-sm btn-outline-secondary float-end refresh-btn"
                    th:onclick="'loadPnl(\'' + ${entry.address} + '\',\'' + ${entry.chainIndex} + '\')'">
                <i class="bi bi-arrow-clockwise"></i>
            </button>
        </div>
        <div class="card-body p-0" th:id="'pnl-' + ${entry.address.substring(2,8)}">
            <div th:if="${entry.pnlList.isEmpty()}" class="p-3 text-center text-muted">暂无持仓数据</div>
            <table th:unless="${entry.pnlList.isEmpty()}" class="table table-sm mb-0">
                <thead><tr>
                    <th>代币</th><th>余额</th><th>仓位价值</th>
                    <th>浮盈/亏</th><th>已实现</th><th>总盈亏</th>
                    <th>买入均价</th><th>卖出均价</th><th>持仓时长</th>
                </tr></thead>
                <tbody>
                <tr th:each="p : ${entry.pnlList}">
                    <td><strong th:text="${p.tokenSymbol}"></strong></td>
                    <td style="font-size:0.8rem" th:text="${p.tokenBalanceAmount != null ? #numbers.formatDecimal(p.tokenBalanceAmount, 1, 4) : '-'}"></td>
                    <td th:text="${p.tokenBalanceUsd != null ? '$' + #numbers.formatDecimal(p.tokenBalanceUsd, 1, 2) : '-'}"></td>
                    <td>
                        <span th:if="${p.unrealizedPnlUsd == 'SELL_ALL'}" class="text-muted">已清仓</span>
                        <span th:unless="${p.unrealizedPnlUsd == 'SELL_ALL'}"
                              th:class="${p.unrealizedPnlUsd != null and p.unrealizedPnlUsd >= 0 ? 'pnl-pos' : 'pnl-neg'}"
                              th:text="${p.unrealizedPnlUsd != null ? '$' + #numbers.formatDecimal(p.unrealizedPnlUsd, 1, 2) : '-'}"></span>
                        <div class="text-muted" style="font-size:0.7rem"
                             th:text="${p.unrealizedPnlPercent != null ? #numbers.formatDecimal(p.unrealizedPnlPercent*100,1,1)+'%' : ''}"></div>
                    </td>
                    <td th:class="${p.realizedPnlUsd != null and p.realizedPnlUsd >= 0 ? 'pnl-pos' : 'pnl-neg'}"
                        th:text="${p.realizedPnlUsd != null ? '$' + #numbers.formatDecimal(p.realizedPnlUsd, 1, 2) : '-'}"></td>
                    <td th:class="${p.totalPnlUsd != null and p.totalPnlUsd >= 0 ? 'pnl-pos fw-bold' : 'pnl-neg fw-bold'}"
                        th:text="${p.totalPnlUsd != null ? '$' + #numbers.formatDecimal(p.totalPnlUsd, 1, 2) : '-'}"></td>
                    <td class="text-muted" style="font-size:0.8rem" th:text="${p.buyAvgPrice != null ? '$' + p.buyAvgPrice : '-'}"></td>
                    <td class="text-muted" style="font-size:0.8rem" th:text="${p.sellAvgPrice != null ? '$' + p.sellAvgPrice : '-'}"></td>
                    <td class="text-muted" style="font-size:0.75rem"
                        th:text="${p.tokenPositionDuration?.holdingTimestamp != null ? '持仓中' : ''}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 交易记录 (按需展开) -->
    <div class="mt-2">
        <button class="btn btn-sm btn-outline-secondary"
                th:onclick="'loadTxHistory(\'' + ${entry.address} + '\',\'' + ${entry.chainIndex} + '\')'">
            <i class="bi bi-list-ul me-1"></i>加载交易记录
        </button>
        <div th:id="'tx-' + ${entry.address.substring(2,8)}" class="mt-2"></div>
    </div>
</div>

<script>
async function loadPnl(address, chain) {
    const resp = await fetch(`/api/portfolio/pnl?address=${address}&chain=${chain}&limit=20`);
    const data = await resp.json();
    console.log('PnL:', data);
    // TODO: re-render pnl table
}

async function loadTxHistory(address, chain) {
    const key = address.substring(2, 8);
    const el = document.getElementById('tx-' + key);
    el.innerHTML = '<div class="text-muted">加载中...</div>';
    const resp = await fetch(`/api/portfolio/txs?address=${address}&chains=${chain}&limit=20`);
    const data = await resp.json();
    const txs = data.transactions || [];
    if (!txs.length) { el.innerHTML = '<div class="text-muted p-2">暂无交易记录</div>'; return; }
    let html = `<div class="card"><div class="card-body p-0"><table class="table table-sm mb-0">
        <thead><tr><th>时间</th><th>代币</th><th>金额</th><th>类型</th><th>状态</th><th>TxHash</th></tr></thead><tbody>`;
    for (const tx of txs) {
        const ts = new Date(parseInt(tx.txTime)).toLocaleString('zh-CN', {timeZone:'Asia/Shanghai'});
        const cls = tx.txStatus === 'success' ? 'pnl-pos' : 'pnl-neg';
        html += `<tr>
            <td style="font-size:0.75rem">${ts}</td>
            <td><strong>${tx.symbol||'-'}</strong></td>
            <td>${tx.amount||'-'}</td>
            <td>${tx.itype=='0'?'主链币转移':tx.itype=='2'?'Token转移':'合约'}</td>
            <td class="${cls}">${tx.txStatus}</td>
            <td class="font-monospace" style="font-size:0.7rem">
                <a href="https://etherscan.io/tx/${tx.txHash}" target="_blank" class="text-info">
                    ${tx.txHash.substring(0,10)}...
                </a>
            </td></tr>`;
    }
    html += '</tbody></table></div></div>';
    el.innerHTML = html;
}
</script>
</main></body>
</html>
