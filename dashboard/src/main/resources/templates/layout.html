<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="page(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title} + ' · OnChain OS'">OnChain OS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page:   #f0f4ff;
            --bg-card:   #ffffff;
            --bg-nav:    #ffffff;
            --bg-hover:  #f5f8ff;
            --bg-tag:    #f1f5ff;

            --border:    #e4e9f5;
            --border-m:  #cdd5ee;

            --t1:  #0f172a;
            --t2:  #4a5878;
            --t3:  #94a3c0;

            --blue:   #3b82f6;
            --blue-l: #eff6ff;
            --blue-b: rgba(59,130,246,.15);

            --green:  #10b981;
            --green-l:#ecfdf5;
            --green-b:rgba(16,185,129,.18);

            --red:    #ef4444;
            --red-l:  #fef2f2;
            --red-b:  rgba(239,68,68,.18);

            --yellow: #f59e0b;
            --yellow-l:#fffbeb;
            --yellow-b:rgba(245,158,11,.18);

            --cyan:   #06b6d4;
            --cyan-l: #ecfeff;

            --purple: #8b5cf6;
            --purple-l:#f5f3ff;

            --orange: #f97316;
            --orange-l:#fff7ed;

            /* Elevation shadows */
            --sh-0: 0 1px 3px rgba(15,23,42,.06), 0 1px 2px rgba(15,23,42,.04);
            --sh-1: 0 4px 12px rgba(15,23,42,.08), 0 2px 6px rgba(15,23,42,.05);
            --sh-2: 0 8px 24px rgba(15,23,42,.10), 0 4px 10px rgba(15,23,42,.06);
            --sh-3: 0 16px 40px rgba(59,130,246,.14), 0 6px 16px rgba(15,23,42,.07);
        }

        *, *::before, *::after { box-sizing: border-box; }
        html, body {
            background: var(--bg-page);
            color: var(--t1);
            font-family: 'Inter', -apple-system, sans-serif;
            font-size: 14px;
            min-height: 100vh;
        }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg-page); }
        ::-webkit-scrollbar-thumb { background: var(--border-m); border-radius: 4px; }

        /* ══ NAVBAR ══ */
        .topnav {
            background: var(--bg-nav);
            border-bottom: 1px solid var(--border);
            box-shadow: var(--sh-0);
            position: sticky; top: 0; z-index: 200;
            padding: 0 32px; height: 58px;
            display: flex; align-items: center;
        }
        .brand {
            font-size: 1.05rem; font-weight: 800; letter-spacing: -.5px;
            color: var(--blue);
            text-decoration: none; white-space: nowrap; margin-right: 40px;
        }
        .brand span { color: var(--t1); }
        .nav-links { display: flex; align-items: center; gap: 2px; flex: 1; }
        .nav-link {
            color: var(--t2); padding: 6px 14px; border-radius: 8px;
            font-weight: 500; font-size: .875rem; text-decoration: none;
            transition: all .18s;
        }
        .nav-link:hover { color: var(--blue); background: var(--blue-l); }
        .nav-link.active {
            color: var(--blue); background: var(--blue-l);
            font-weight: 600;
        }
        .nav-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
        .live-indicator {
            display: flex; align-items: center; gap: 6px;
            font-size: .75rem; color: var(--green); font-weight: 500;
        }
        .live-indicator::before {
            content: ''; width: 7px; height: 7px; border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 0 0 rgba(16,185,129,.5);
            animation: livePulse 2s infinite;
        }
        @keyframes livePulse {
            0%  { box-shadow: 0 0 0 0   rgba(16,185,129,.5); }
            70% { box-shadow: 0 0 0 7px rgba(16,185,129,0); }
            100%{ box-shadow: 0 0 0 0   rgba(16,185,129,0); }
        }
        .clock-pill {
            font-family: 'JetBrains Mono'; font-size: .72rem;
            color: var(--t3); background: var(--bg-page);
            border: 1px solid var(--border); border-radius: 20px;
            padding: 4px 12px; white-space: nowrap;
        }

        /* ══ CARDS ══ */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            box-shadow: var(--sh-0);
            overflow: hidden;
            transition: box-shadow .22s ease, transform .22s ease;
        }
        .card:hover {
            box-shadow: var(--sh-2);
            transform: translateY(-2px);
        }
        .card-header {
            background: #fafbff;
            border-bottom: 1px solid var(--border);
            padding: 13px 20px;
            font-weight: 600; font-size: .875rem; color: var(--t1);
            display: flex; align-items: center; gap: 8px;
        }
        .card-body { padding: 18px 20px; }
        .card-body.p-0 { padding: 0; }

        /* ══ STAT CARDS ══ */
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            box-shadow: var(--sh-0);
            padding: 18px 20px;
            position: relative; overflow: hidden;
            transition: box-shadow .22s ease, transform .22s ease, border-color .22s;
        }
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--sh-3);
            border-color: var(--sc-border, var(--blue-b));
        }
        /* Colored left accent bar */
        .stat-card::before {
            content: '';
            position: absolute; top: 14px; bottom: 14px; left: 0;
            width: 4px; border-radius: 0 3px 3px 0;
            background: var(--sc-accent, var(--blue));
        }
        /* Soft tinted bg on hover */
        .stat-card::after {
            content: '';
            position: absolute; inset: 0;
            background: var(--sc-bg, var(--blue-l));
            opacity: 0; transition: opacity .22s;
            pointer-events: none;
        }
        .stat-card:hover::after { opacity: .35; }

        .stat-card .sc-icon { font-size: 1.35rem; margin-bottom: 10px; display: block; position: relative; z-index:1; }
        .stat-card .sc-val  { font-size: 1.55rem; font-weight: 800; line-height: 1.1; margin-bottom: 4px; position: relative; z-index:1; }
        .stat-card .sc-lbl  { font-size: .71rem; color: var(--t3); font-weight: 600; text-transform: uppercase; letter-spacing: .7px; position: relative; z-index:1; }
        .stat-card .sc-sub  { font-size: .74rem; color: var(--t2); margin-top: 5px; position: relative; z-index:1; }

        .sc-blue   { --sc-accent:var(--blue);   --sc-border:var(--blue-b);   --sc-bg:var(--blue-l);   }
        .sc-green  { --sc-accent:var(--green);  --sc-border:var(--green-b);  --sc-bg:var(--green-l);  }
        .sc-red    { --sc-accent:var(--red);    --sc-border:var(--red-b);    --sc-bg:var(--red-l);    }
        .sc-yellow { --sc-accent:var(--yellow); --sc-border:var(--yellow-b); --sc-bg:var(--yellow-l); }
        .sc-cyan   { --sc-accent:var(--cyan);   --sc-border:rgba(6,182,212,.18); --sc-bg:var(--cyan-l); }
        .sc-purple { --sc-accent:var(--purple); --sc-border:rgba(139,92,246,.18); --sc-bg:var(--purple-l); }
        .sc-orange { --sc-accent:var(--orange); --sc-border:rgba(249,115,22,.18); --sc-bg:var(--orange-l); }

        .sc-blue .sc-val   { color: var(--blue); }
        .sc-green .sc-val  { color: var(--green); }
        .sc-red .sc-val    { color: var(--red); }
        .sc-yellow .sc-val { color: var(--yellow); }
        .sc-cyan .sc-val   { color: var(--cyan); }
        .sc-purple .sc-val { color: var(--purple); }
        .sc-orange .sc-val { color: var(--orange); }

        /* ══ TABLES ══ */
        .table { color: var(--t1); margin: 0; }
        .table thead th {
            background: #f8faff;
            color: var(--t3); font-size: .69rem;
            font-weight: 700; text-transform: uppercase; letter-spacing: .7px;
            border-bottom: 1px solid var(--border);
            padding: 10px 16px; white-space: nowrap;
        }
        .table tbody td {
            border-bottom: 1px solid #f0f3fb;
            padding: 11px 16px; vertical-align: middle;
        }
        .table tbody tr:last-child td { border-bottom: none; }
        .table tbody tr {
            transition: background .15s;
        }
        /* ← KEY: hover is light blue, NOT dark */
        .table tbody tr:hover td {
            background: #f0f6ff;
        }

        /* ══ PNL COLORS ══ */
        .up { color: var(--green) !important; }
        .dn { color: var(--red)   !important; }
        .t-blue   { color: var(--blue)   !important; }
        .t-yellow { color: var(--yellow) !important; }
        .t-cyan   { color: var(--cyan)   !important; }
        .t-purple { color: var(--purple) !important; }
        .t-muted  { color: var(--t2)     !important; }
        .t-dim    { color: var(--t3)     !important; }
        .fw-7 { font-weight: 700; }
        .fw-8 { font-weight: 800; }
        .mono { font-family: 'JetBrains Mono'; }

        /* ══ TAGS ══ */
        .tag-up {
            background: var(--green-l); color: var(--green);
            border: 1px solid var(--green-b);
            padding: 2px 10px; border-radius: 20px;
            font-size: .78rem; font-weight: 700; white-space: nowrap;
        }
        .tag-dn {
            background: var(--red-l); color: var(--red);
            border: 1px solid var(--red-b);
            padding: 2px 10px; border-radius: 20px;
            font-size: .78rem; font-weight: 700; white-space: nowrap;
        }
        .tag-blue {
            background: var(--blue-l); color: var(--blue);
            border: 1px solid var(--blue-b);
            padding: 2px 10px; border-radius: 20px;
            font-size: .78rem; font-weight: 700; white-space: nowrap;
        }
        .tag-yellow {
            background: var(--yellow-l); color: var(--yellow);
            border: 1px solid var(--yellow-b);
            padding: 2px 10px; border-radius: 20px;
            font-size: .78rem; font-weight: 700; white-space: nowrap;
        }
        .tag-gray {
            background: #f1f5f9; color: var(--t2);
            border: 1px solid var(--border);
            padding: 2px 10px; border-radius: 20px;
            font-size: .78rem; font-weight: 500; white-space: nowrap;
        }

        /* ══ CHAIN BADGES ══ */
        .chain-badge {
            font-size: .65rem; font-weight: 700;
            padding: 2px 8px; border-radius: 5px; white-space: nowrap; letter-spacing: .3px;
        }
        .c-1    { background: #eff1fd; color: #3b5bdb; border: 1px solid #c5ccf8; }
        .c-56   { background: #fffbeb; color: #b45309; border: 1px solid #fde68a; }
        .c-8453 { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
        .c-501  { background: #f5f3ff; color: #6d28d9; border: 1px solid #ddd6fe; }

        /* ══ SCORE ══ */
        .score-pill {
            font-family: 'JetBrains Mono'; font-size: .8rem; font-weight: 700;
            padding: 3px 10px; border-radius: 20px;
            background: var(--blue-l); color: var(--blue);
            border: 1px solid var(--blue-b);
        }
        .score-pill.s-high { background: var(--green-l); color: var(--green); border-color: var(--green-b); }
        .score-pill.s-med  { background: var(--yellow-l); color: var(--yellow); border-color: var(--yellow-b); }

        /* ══ ADDRESS ══ */
        .addr {
            font-family: 'JetBrains Mono'; font-size: .77rem;
            color: var(--blue); cursor: pointer; text-decoration: none;
        }
        .addr:hover { color: #1d4ed8; text-decoration: underline; }

        /* ══ BUTTONS ══ */
        .btn-primary-g {
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            color: #fff; border: none; border-radius: 8px;
            padding: 7px 18px; font-size: .82rem; font-weight: 600;
            cursor: pointer; white-space: nowrap;
            box-shadow: 0 2px 8px rgba(59,130,246,.3);
            transition: box-shadow .18s, transform .18s;
        }
        .btn-primary-g:hover {
            box-shadow: 0 6px 18px rgba(59,130,246,.4);
            transform: translateY(-1px);
        }
        .btn-outline {
            background: #fff; color: var(--t2);
            border: 1px solid var(--border-m);
            border-radius: 8px; padding: 6px 14px;
            font-size: .78rem; font-weight: 500;
            cursor: pointer; white-space: nowrap;
            text-decoration: none; display: inline-block;
            transition: all .18s; box-shadow: var(--sh-0);
        }
        .btn-outline:hover {
            color: var(--blue); border-color: var(--blue);
            background: var(--blue-l);
            box-shadow: 0 4px 12px rgba(59,130,246,.12);
            transform: translateY(-1px);
        }
        .btn-green-o {
            background: var(--green-l); color: var(--green);
            border: 1px solid var(--green-b);
            border-radius: 6px; padding: 4px 11px;
            font-size: .75rem; font-weight: 600;
            cursor: pointer; text-decoration: none; display: inline-block;
            transition: all .18s;
        }
        .btn-green-o:hover {
            background: #d1fae5;
            box-shadow: 0 3px 10px rgba(16,185,129,.2);
            transform: translateY(-1px);
        }

        /* ══ TABS ══ */
        .tab-row {
            display: inline-flex; gap: 3px;
            background: #f1f5ff;
            border: 1px solid var(--border);
            border-radius: 10px; padding: 3px;
        }
        .tab-item {
            padding: 5px 14px; border-radius: 7px;
            font-size: .8rem; font-weight: 500; color: var(--t2);
            cursor: pointer; transition: all .15s; white-space: nowrap;
        }
        .tab-item:hover:not(.active) { color: var(--blue); background: rgba(59,130,246,.08); }
        .tab-item.active {
            background: #fff; color: var(--blue);
            font-weight: 600;
            box-shadow: 0 1px 4px rgba(15,23,42,.1);
        }

        /* ══ MISC ══ */
        .pulse-dot {
            display: inline-block; width: 7px; height: 7px;
            border-radius: 50%; background: var(--green);
            animation: livePulse 2s infinite;
        }
        .page-wrap { padding: 22px 28px; max-width: 1640px; margin: 0 auto; }
        .empty-state { padding: 44px 20px; text-align: center; color: var(--t3); }
        .price-item { display:flex; align-items:center; gap:4px; flex-wrap:wrap; }
        .price-sym  { font-size:.65rem; font-weight:700; color:var(--t3); min-width:26px; }
        .price-val  { font-size:.78rem; font-weight:800; color:var(--t1); }
        .price-chg  { font-size:.6rem;  font-weight:600; margin-left:1px; }
        .empty-state .ei { font-size: 2.4rem; margin-bottom: 12px; }
        .info-pill {
            display: inline-flex; align-items: center; gap: 4px;
            font-size: .72rem; color: var(--t2);
            background: var(--bg-tag); border: 1px solid var(--border);
            border-radius: 20px; padding: 2px 10px;
        }
        .token-logo { width: 26px; height: 26px; border-radius: 50%; border: 1px solid var(--border); }
        .mini-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 8px; }
        .mini-bar-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--blue), var(--cyan)); }
        .section-hd { font-size: .69rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--t3); margin-bottom: 14px; }

        /* Rank rows */
        .rank-1 { background: linear-gradient(90deg, rgba(245,158,11,.05), transparent) !important; }
        .rank-2 { background: linear-gradient(90deg, rgba(148,163,192,.04), transparent) !important; }
        .rank-3 { background: linear-gradient(90deg, rgba(180,100,30,.03), transparent) !important; }
        .rank-1:hover td, .rank-2:hover td, .rank-3:hover td { background: #f0f6ff !important; }

        .sig-row td:first-child { border-left: 3px solid var(--green); }
    </style>
    <!-- 工具函数：提前定义，保证所有页面脚本都能调用 -->
    <script>
    function fmtUsd(v,d=0){
        const n=parseFloat(v)||0,a=Math.abs(n),sg=n<0?'-':'';
        if(a>=1e9) return sg+'$'+(a/1e9).toFixed(1)+'B';
        if(a>=1e6) return sg+'$'+(a/1e6).toFixed(1)+'M';
        if(a>=1e3) return sg+'$'+(a/1e3).toFixed(1)+'K';
        return sg+'$'+a.toFixed(d);
    }
    function fmtMcap(v){
        const n=parseFloat(v)||0;
        if(n<=0)   return '—';
        if(n>=1e9) return '$'+(n/1e9).toFixed(1)+'B';
        if(n>=1e6) return '$'+(n/1e6).toFixed(1)+'M';
        if(n>=100) return '$'+(n/1e3).toFixed(1)+'K';
        return '$0.1K';
    }
    </script>
</head>
<body>

<nav class="topnav">
    <a class="brand" href="/">⛓ <span>OnChain OS</span></a>
    <div class="nav-links">
        <a class="nav-link" th:classappend="${activePage=='index'      ? ' active' : ''}" href="/">📊 总览</a>
        <a class="nav-link" th:classappend="${activePage=='signals'    ? ' active' : ''}" href="/signals">⚡ 买入信号</a>
        <a class="nav-link" th:classappend="${activePage=='pump'       ? ' active' : ''}" href="/pump">🚀 新币发射</a>
        <a class="nav-link" th:classappend="${activePage=='smart-money'? ' active' : ''}" href="/smart-money">🧠 聪明钱</a>
        <a class="nav-link" th:classappend="${activePage=='portfolio'  ? ' active' : ''}" href="/portfolio">💼 我的持仓</a>
        <a class="nav-link" th:classappend="${activePage=='my-addresses'? ' active' : ''}" href="/my-addresses">📌 关注地址</a>
        <a class="nav-link" th:classappend="${activePage=='trade'       ? ' active' : ''}" href="/trade">⚡ 交易</a>
        <a class="nav-link" th:classappend="${activePage=='transfer'    ? ' active' : ''}" href="/transfer">💸 转账</a>
        <a class="nav-link" th:classappend="${activePage=='perps'       ? ' active' : ''}" href="/perps">📈 Perps</a>
        <a class="nav-link" th:classappend="${activePage=='qmt'         ? ' active' : ''}" href="/qmt">🤖 QMT</a>
    </div>
    <div class="nav-right">
        <span class="live-indicator">实时</span>
        <!-- 自动刷新倒计时（仅首页显示，由 index.html JS 控制） -->
        <span id="nav-refresh-badge" style="display:none;
              background:#f0f4ff;border:1px solid #c7d7fa;color:#3b82f6;
              border-radius:20px;padding:3px 11px;font-size:.74rem;font-weight:600;
              pointer-events:none;user-select:none;letter-spacing:.02em">
            🔄 <span id="nav-countdown">60</span>s
        </span>
        <span class="clock-pill" id="clock">--</span>
    </div>
</nav>

<div class="page-wrap" th:insert="${content}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const clockEl = document.getElementById('clock');
function tick() {
    clockEl.textContent = new Date().toLocaleString('zh-CN',{
        timeZone:'Asia/Shanghai',month:'2-digit',day:'2-digit',
        hour:'2-digit',minute:'2-digit',second:'2-digit'
    });
}
tick(); setInterval(tick,1000);

const $ = s => document.querySelector(s);
const $$ = s => [...document.querySelectorAll(s)];

// fmtUsd / fmtMcap 已在 <head> 定义
function copyAddr(addr){
    if(navigator.clipboard && window.isSecureContext){
        navigator.clipboard.writeText(addr).then(()=>_toast('✅ 已复制')).catch(()=>_fallbackCopy(addr));
    } else {
        _fallbackCopy(addr);
    }
}
function _fallbackCopy(addr){
    const el=document.createElement('textarea');
    el.value=addr; el.style.cssText='position:fixed;opacity:0;top:0;left:0;';
    document.body.appendChild(el); el.focus(); el.select();
    try{ document.execCommand('copy'); _toast('✅ 已复制'); }
    catch(e){ _toast('❌ 复制失败，请手动选中复制'); }
    document.body.removeChild(el);
}
function _toast(msg){
    let t=document.getElementById('_copy_toast');
    if(!t){ t=document.createElement('div'); t.id='_copy_toast';
        t.style.cssText='position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:rgba(30,30,30,.92);color:#fff;padding:9px 22px;border-radius:10px;z-index:9999;font-size:.84rem;pointer-events:none;transition:opacity .2s;';
        document.body.appendChild(t); }
    t.textContent=msg; t.style.opacity='1'; t.style.display='block';
    clearTimeout(t._t); t._t=setTimeout(()=>{ t.style.opacity='0'; setTimeout(()=>t.style.display='none',200); },2000);
}
</script>
</body>
