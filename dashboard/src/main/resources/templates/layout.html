<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="page(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title} + ' | AI OnChain OS'">AI OnChain OS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #0d1117; color: #e6edf3; font-family: 'SF Pro Text', -apple-system, sans-serif; }
        .navbar { background: #161b22 !important; border-bottom: 1px solid #30363d; }
        .navbar-brand { color: #58a6ff !important; font-weight: 700; }
        .nav-link { color: #8b949e !important; }
        .nav-link.active, .nav-link:hover { color: #58a6ff !important; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; }
        .card-header { background: #1c2128; border-bottom: 1px solid #30363d; font-weight: 600; }
        .table { color: #e6edf3; }
        .table thead th { border-bottom-color: #30363d; color: #8b949e; font-size: 0.8rem; text-transform: uppercase; }
        .table tbody tr:hover { background: #1c2128; }
        .badge-chain { font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; }
        .chain-1 { background: #4169e1; }
        .chain-56 { background: #f0b90b; color: #000; }
        .chain-8453 { background: #0052ff; }
        .chain-501 { background: #9945ff; }
        .pnl-pos { color: #3fb950; }
        .pnl-neg { color: #f85149; }
        .score-badge { font-size: 0.85rem; font-weight: 700; padding: 3px 8px; border-radius: 4px;
                       background: linear-gradient(135deg, #1f6feb, #388bfd); }
        .signal-row { border-left: 3px solid #3fb950; }
        .stat-card { border-radius: 8px; padding: 16px; }
        .stat-value { font-size: 1.5rem; font-weight: 700; }
        .stat-label { font-size: 0.75rem; color: #8b949e; }
        .refresh-btn { font-size: 0.75rem; }
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #0d1117; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid px-4">
        <a class="navbar-brand" href="/"><i class="bi bi-cpu-fill me-2"></i>AI OnChain OS</a>
        <div class="navbar-nav ms-3">
            <a class="nav-link" th:classappend="${#httpServletRequest.requestURI == '/' ? 'active' : ''}" href="/">总览</a>
            <a class="nav-link" th:classappend="${#httpServletRequest.requestURI.startsWith('/smart-money') ? 'active' : ''}" href="/smart-money">聪明钱</a>
            <a class="nav-link" th:classappend="${#httpServletRequest.requestURI.startsWith('/portfolio') ? 'active' : ''}" href="/portfolio">我的持仓</a>
        </div>
        <span class="ms-auto text-muted" style="font-size:0.75rem" id="clock"></span>
    </div>
</nav>
<div class="container-fluid px-4 py-3" th:insert="${content}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script>
    // Clock
    setInterval(() => {
        const now = new Date();
        document.getElementById('clock').textContent =
            now.toLocaleString('zh-CN', {timeZone:'Asia/Shanghai'}) + ' (UTC+8)';
    }, 1000);
    // Format helpers
    function fmtUsd(v) {
        const n = parseFloat(v) || 0;
        if (Math.abs(n) >= 1e6) return '$' + (n/1e6).toFixed(2) + 'M';
        if (Math.abs(n) >= 1e3) return '$' + (n/1e3).toFixed(1) + 'K';
        return '$' + n.toFixed(2);
    }
    function fmtPct(v) { return (parseFloat(v)*100).toFixed(1) + '%'; }
    function pnlClass(v) { return parseFloat(v) >= 0 ? 'pnl-pos' : 'pnl-neg'; }
    function chainName(c) { return {1:'ETH',56:'BSC',8453:'Base',501:'SOL'}[c] || c; }
    function chainClass(c) { return 'badge-chain chain-'+c; }
</script>
</body>
</html>
