<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="page(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title} + ' · OnChain OS'">OnChain OS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base:    #0b0e11;
            --bg-card:    #161a1e;
            --bg-hover:   #1e2329;
            --bg-input:   #1e2329;
            --border:     #2b3139;
            --border-light: #363c45;
            --text-primary:   #eaecef;
            --text-secondary: #848e9c;
            --text-muted:     #5e6673;
            --green:    #0ecb81;
            --green-dim: rgba(14,203,129,.15);
            --red:      #f6465d;
            --red-dim:  rgba(246,70,93,.15);
            --yellow:   #f0b90b;
            --yellow-dim: rgba(240,185,11,.12);
            --blue:     #1890ff;
            --blue-dim: rgba(24,144,255,.12);
            --purple:   #9945ff;
            --chain-eth:  #4e79ea;
            --chain-bsc:  #f0b90b;
            --chain-base: #0052ff;
            --chain-sol:  #9945ff;
        }
        *, *::before, *::after { box-sizing: border-box; }
        html, body { background: var(--bg-base); color: var(--text-primary);
            font-family: 'Inter', -apple-system, sans-serif; font-size: 14px; min-height: 100vh; }

        /* ─── Scrollbar ─── */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg-base); }
        ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }

        /* ─── Navbar ─── */
        .topnav {
            background: rgba(11,14,17,.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
            padding: 0 24px; height: 56px;
            display: flex; align-items: center; gap: 32px;
        }
        .topnav .brand {
            font-size: 1.1rem; font-weight: 700; letter-spacing: -.3px;
            background: linear-gradient(135deg, var(--yellow), #ff9900);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            white-space: nowrap; text-decoration: none;
        }
        .topnav .nav-items { display: flex; gap: 4px; }
        .topnav .nav-link {
            color: var(--text-secondary); padding: 6px 14px; border-radius: 6px;
            font-weight: 500; font-size: .875rem; text-decoration: none; transition: all .15s;
        }
        .topnav .nav-link:hover { color: var(--text-primary); background: var(--bg-hover); }
        .topnav .nav-link.active { color: var(--text-primary); background: var(--bg-hover); }
        .topnav .clock { margin-left: auto; color: var(--text-muted); font-family: 'JetBrains Mono'; font-size: .78rem; }

        /* ─── Cards ─── */
        .card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 12px; overflow: hidden;
        }
        .card-header {
            background: transparent; border-bottom: 1px solid var(--border);
            padding: 14px 18px; font-weight: 600; font-size: .875rem;
            display: flex; align-items: center; gap: 8px;
        }
        .card-body { padding: 16px 18px; }
        .card-body.p-0 { padding: 0; }

        /* ─── Stat Cards ─── */
        .stat-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 12px; padding: 18px 20px; position: relative; overflow: hidden;
        }
        .stat-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent, var(--blue)), transparent);
        }
        .stat-card .stat-icon { font-size: 1.4rem; margin-bottom: 8px; display: block; }
        .stat-card .stat-val { font-size: 1.4rem; font-weight: 700; line-height: 1; margin-bottom: 4px; }
        .stat-card .stat-lbl { font-size: .75rem; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: .5px; }

        /* ─── Tables ─── */
        .table { color: var(--text-primary); margin: 0; }
        .table thead th {
            background: var(--bg-base); color: var(--text-muted); font-size: .7rem;
            font-weight: 600; text-transform: uppercase; letter-spacing: .6px;
            border-bottom: 1px solid var(--border); padding: 10px 16px; white-space: nowrap;
        }
        .table tbody td { border-bottom: 1px solid var(--border); padding: 11px 16px; vertical-align: middle; }
        .table tbody tr:last-child td { border-bottom: none; }
        .table tbody tr:hover td { background: var(--bg-hover); }
        .table tbody tr { transition: background .1s; }

        /* ─── PnL Colors ─── */
        .up, .pnl-pos, .text-green { color: var(--green) !important; }
        .dn, .pnl-neg, .text-red   { color: var(--red) !important; }
        .text-yellow { color: var(--yellow) !important; }
        .text-blue   { color: var(--blue) !important; }
        .text-muted-custom { color: var(--text-muted) !important; }

        .up-bg { background: var(--green-dim); color: var(--green); padding: 2px 8px; border-radius: 4px; font-weight: 600; font-size: .8rem; }
        .dn-bg { background: var(--red-dim); color: var(--red); padding: 2px 8px; border-radius: 4px; font-weight: 600; font-size: .8rem; }

        /* ─── Chain Badges ─── */
        .chain-badge {
            font-size: .65rem; font-weight: 700; padding: 2px 7px;
            border-radius: 4px; white-space: nowrap; letter-spacing: .3px;
        }
        .chain-1    { background: rgba(78,121,234,.2); color: #7aa4f7; border: 1px solid rgba(78,121,234,.3); }
        .chain-56   { background: rgba(240,185,11,.15); color: var(--yellow); border: 1px solid rgba(240,185,11,.3); }
        .chain-8453 { background: rgba(0,82,255,.2); color: #5c91ff; border: 1px solid rgba(0,82,255,.3); }
        .chain-501  { background: rgba(153,69,255,.2); color: #b97cff; border: 1px solid rgba(153,69,255,.3); }

        /* ─── Score Badge ─── */
        .score-badge {
            font-family: 'JetBrains Mono'; font-size: .8rem; font-weight: 700;
            padding: 3px 9px; border-radius: 6px;
            background: linear-gradient(135deg, #1a2a4a, #1890ff22);
            border: 1px solid rgba(24,144,255,.3); color: #5ba3f5;
        }
        .score-high { background: linear-gradient(135deg, #0a2a1a, #0ecb8122); border-color: rgba(14,203,129,.3); color: var(--green); }

        /* ─── Wallet Address ─── */
        .addr { font-family: 'JetBrains Mono'; font-size: .78rem; color: #5ba3f5; cursor: pointer; }
        .addr:hover { color: #89c4f4; text-decoration: underline; }

        /* ─── Signal Row ─── */
        .signal-new { border-left: 3px solid var(--green); }
        .signal-old { border-left: 3px solid var(--border); }

        /* ─── Buttons ─── */
        .btn-primary-custom {
            background: var(--yellow); color: #1a1200; font-weight: 600;
            border: none; border-radius: 6px; padding: 6px 16px; font-size: .82rem; cursor: pointer;
            transition: opacity .15s;
        }
        .btn-primary-custom:hover { opacity: .85; }
        .btn-ghost {
            background: transparent; color: var(--text-secondary); border: 1px solid var(--border);
            border-radius: 6px; padding: 5px 12px; font-size: .78rem; cursor: pointer;
            transition: all .15s;
        }
        .btn-ghost:hover { border-color: var(--border-light); color: var(--text-primary); background: var(--bg-hover); }
        .btn-green { background: var(--green-dim); color: var(--green); border: 1px solid rgba(14,203,129,.3); border-radius: 6px; padding: 4px 10px; font-size: .75rem; cursor: pointer; transition: all .15s; }
        .btn-green:hover { background: rgba(14,203,129,.25); }

        /* ─── Select / Input ─── */
        select.custom-select, input.custom-input {
            background: var(--bg-input); color: var(--text-primary);
            border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px;
            font-size: .82rem; outline: none;
        }
        select.custom-select:focus, input.custom-input:focus { border-color: var(--blue); }

        /* ─── Glow number ─── */
        .glow-green { text-shadow: 0 0 12px rgba(14,203,129,.5); }
        .glow-red   { text-shadow: 0 0 12px rgba(246,70,93,.5); }

        /* ─── Divider ─── */
        .divider { border-top: 1px solid var(--border); margin: 0; }

        /* ─── Page layout ─── */
        .page-wrap { padding: 20px 24px; max-width: 1600px; margin: 0 auto; }

        /* ─── Section title ─── */
        .section-title { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 12px; }

        /* ─── Token logo ─── */
        .token-logo { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; }

        /* ─── Pulse dot ─── */
        .pulse { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--green);
            box-shadow: 0 0 0 0 rgba(14,203,129,.5); animation: pulse 2s infinite; }
        @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(14,203,129,.5)} 70%{box-shadow:0 0 0 6px transparent} 100%{box-shadow:0 0 0 0 transparent} }

        /* ─── Rank number ─── */
        .rank-num { font-family: 'JetBrains Mono'; font-size: .75rem; color: var(--text-muted); font-weight: 700; }
        .rank-1 .rank-num { color: var(--yellow); }
        .rank-2 .rank-num { color: #adb5bd; }
        .rank-3 .rank-num { color: #cd7f32; }

        /* ─── Progress bar ─── */
        .mini-bar { height: 3px; border-radius: 2px; background: var(--border); overflow: hidden; }
        .mini-bar-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--green), #00e5a0); }

        /* ─── Tabs ─── */
        .tab-row { display: flex; gap: 2px; background: var(--bg-base); padding: 3px; border-radius: 8px; border: 1px solid var(--border); display: inline-flex; }
        .tab-item { padding: 5px 14px; border-radius: 6px; font-size: .8rem; font-weight: 500; color: var(--text-secondary); cursor: pointer; transition: all .15s; }
        .tab-item.active { background: var(--bg-card); color: var(--text-primary); }
        .tab-item:hover:not(.active) { color: var(--text-primary); }

        /* ─── Empty state ─── */
        .empty-state { padding: 40px 20px; text-align: center; color: var(--text-muted); }
        .empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }

        /* ─── Copy tooltip ─── */
        .copied { color: var(--green) !important; }
    </style>
</head>
<body>
<!-- Navbar -->
<nav class="topnav">
    <a class="brand" href="/">⛓️ OnChain OS</a>
    <div class="nav-items">
        <a class="nav-link" th:classappend="${activePage == 'index' ? 'active' : ''}" href="/">
            📊 总览
        </a>
        <a class="nav-link" th:classappend="${activePage == 'smart-money' ? 'active' : ''}" href="/smart-money">
            🧠 聪明钱
        </a>
        <a class="nav-link" th:classappend="${activePage == 'portfolio' ? 'active' : ''}" href="/portfolio">
            💼 我的持仓
        </a>
    </div>
    <div class="clock" id="clock">--</div>
</nav>

<!-- Page content -->
<div class="page-wrap" th:insert="${content}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script>
// Clock
setInterval(() => {
    document.getElementById('clock').textContent =
        new Date().toLocaleString('zh-CN', {timeZone:'Asia/Shanghai',
            year:'numeric',month:'2-digit',day:'2-digit',
            hour:'2-digit',minute:'2-digit',second:'2-digit'});
}, 1000);

// Format helpers
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

function fmtUsd(v, decimals=2) {
    const n = parseFloat(v) || 0;
    const abs = Math.abs(n);
    const sign = n < 0 ? '-' : '';
    if (abs >= 1e6) return sign + '$' + (abs/1e6).toFixed(2) + 'M';
    if (abs >= 1e3) return sign + '$' + (abs/1e3).toFixed(1) + 'K';
    return sign + '$' + abs.toFixed(decimals);
}
function fmtPct(v) {
    const n = parseFloat(v) || 0;
    return (n >= 0 ? '+' : '') + n.toFixed(1) + '%';
}
function pnlClass(v) { return parseFloat(v) >= 0 ? 'up' : 'dn'; }
function pnlBgClass(v) { return parseFloat(v) >= 0 ? 'up-bg' : 'dn-bg'; }
function chainName(c) { return {1:'ETH',56:'BSC',8453:'Base',501:'SOL'}[c] || 'Chain'+c; }
function chainClass(c) { return 'chain-badge chain-'+c; }

// Copy address
function copyAddr(addr) {
    navigator.clipboard.writeText(addr).catch(()=>{});
}

// Rank medal
function rankEmoji(i) { return ['🥇','🥈','🥉'][i] || `#${i+1}`; }
</script>
</body>
</html>
