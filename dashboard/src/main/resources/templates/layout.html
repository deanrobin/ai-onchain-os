<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="page(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title} + ' · OnChain OS'">OnChain OS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/apple-design.css">
    <style>
        :root {
            /* ── 语义别名：将 apple-design.css 的 token 映射到组件变量 ── */
            --bg-page:  #F2F2F7;                      /* Apple 次级系统背景 */
            --bg-card:  #FFFFFF;
            --bg-nav:   rgba(255,255,255,0.72);       /* 毛玻璃导航栏 */
            --bg-hover: rgba(116,116,128,0.08);       /* --apple-fill4 */
            --bg-tag:   rgba(118,118,128,0.12);       /* --apple-fill3 */

            --border:   #C6C6C8;                      /* Apple opaque separator */
            --border-m: #D1D1D6;                      /* Apple gray4 */

            --t1:  #000000;
            --t2:  rgba(60,60,67,0.60);
            --t3:  rgba(60,60,67,0.30);

            --blue:   #007AFF;
            --blue-l: rgba(0,122,255,0.10);
            --blue-b: rgba(0,122,255,0.10);

            --green:  #34C759;
            --green-l:rgba(52,199,89,0.12);
            --green-b:rgba(52,199,89,0.12);

            --red:    #FF3B30;
            --red-l:  rgba(255,59,48,0.10);
            --red-b:  rgba(255,59,48,0.10);

            --yellow: #FF9500;
            --yellow-l:rgba(255,149,0,0.10);
            --yellow-b:rgba(255,149,0,0.10);

            --cyan:   #5AC8FA;
            --cyan-l: rgba(90,200,250,0.12);

            --purple: #AF52DE;
            --purple-l:rgba(175,82,222,0.10);

            --orange: #FF9500;
            --orange-l:rgba(255,149,0,0.10);

            /* Elevation shadows — Apple 风格：低饱和、多层 */
            --sh-0: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
            --sh-1: 0 4px 12px rgba(0,0,0,.10), 0 2px 4px rgba(0,0,0,.06);
            --sh-2: 0 8px 24px rgba(0,0,0,.12), 0 3px 8px rgba(0,0,0,.07);
            --sh-3: 0 20px 60px rgba(0,0,0,.16), 0 8px 20px rgba(0,0,0,.09);
        }

        *, *::before, *::after { box-sizing: border-box; }
        html, body {
            background: var(--bg-page);
            color: var(--t1);
            font-family: -apple-system, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
            font-size: 14px;
            min-height: 100vh;
        }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #D1D1D6; border-radius: 999px; }

        /* ══ NAVBAR — 毛玻璃材质 ══ */
        .topnav {
            background: var(--bg-nav);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid rgba(60,60,67,0.29);
            position: sticky; top: 0; z-index: 200;
            padding: 0 32px; height: 58px;
            display: flex; align-items: center;
        }
        .brand {
            font-size: 1.05rem; font-weight: 700; letter-spacing: -.3px;
            color: var(--blue);
            text-decoration: none; white-space: nowrap; margin-right: 40px;
        }
        .brand span { color: var(--t1); }
        .nav-links { display: flex; align-items: center; gap: 2px; flex: 1; }
        .nav-link {
            color: var(--t2); padding: 6px 12px; border-radius: 8px;
            font-weight: 500; font-size: .875rem; text-decoration: none;
            transition: all 150ms cubic-bezier(0.25,0.46,0.45,0.94);
        }
        .nav-link:hover { color: var(--blue); background: var(--blue-l); }
        .nav-link.active {
            color: var(--blue); background: var(--blue-l);
            font-weight: 600;
        }
        .nav-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
        .live-indicator {
            display: flex; align-items: center; gap: 6px;
            font-size: .75rem; color: var(--green); font-weight: 500;
        }
        .live-indicator::before {
            content: ''; width: 7px; height: 7px; border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 0 0 rgba(52,199,89,.5);
            animation: livePulse 2s infinite;
        }
        @keyframes livePulse {
            0%  { box-shadow: 0 0 0 0   rgba(52,199,89,.5); }
            70% { box-shadow: 0 0 0 7px rgba(52,199,89,0); }
            100%{ box-shadow: 0 0 0 0   rgba(52,199,89,0); }
        }
        .clock-pill {
            font-family: 'SF Mono','Menlo','Monaco','Courier New',monospace; font-size: .72rem;
            color: var(--t2); background: rgba(118,118,128,0.12);
            border-radius: 999px;
            padding: 4px 12px; white-space: nowrap;
        }

        /* ══ CARDS ══ */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: var(--sh-0);
            overflow: hidden;
            transition: box-shadow 250ms cubic-bezier(0.25,0.46,0.45,0.94),
                        transform 250ms cubic-bezier(0.25,0.46,0.45,0.94);
        }
        .card:hover {
            box-shadow: var(--sh-1);
            transform: translateY(-2px);
        }
        .card-header {
            background: rgba(116,116,128,0.06);
            border-bottom: 1px solid var(--border);
            padding: 13px 20px;
            font-weight: 600; font-size: .875rem; color: var(--t1);
            display: flex; align-items: center; gap: 8px;
        }
        .card-body { padding: 18px 20px; }
        .card-body.p-0 { padding: 0; }

        /* ══ STAT CARDS ══ */
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: var(--sh-0);
            padding: 18px 20px;
            position: relative; overflow: hidden;
            transition: box-shadow 250ms cubic-bezier(0.25,0.46,0.45,0.94),
                        transform 250ms cubic-bezier(0.25,0.46,0.45,0.94);
        }
        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--sh-2);
        }
        /* 细 accent bar */
        .stat-card::before {
            content: '';
            position: absolute; top: 14px; bottom: 14px; left: 0;
            width: 3px; border-radius: 0 3px 3px 0;
            background: var(--sc-accent, var(--blue));
        }
        /* Wash 背景（hover 时淡入） */
        .stat-card::after {
            content: '';
            position: absolute; inset: 0;
            background: var(--sc-bg, var(--blue-l));
            opacity: 0; transition: opacity 250ms;
            pointer-events: none;
        }
        .stat-card:hover::after { opacity: .45; }

        .stat-card .sc-icon { font-size: 1.35rem; margin-bottom: 10px; display: block; position: relative; z-index:1; }
        .stat-card .sc-val  { font-size: 1.55rem; font-weight: 800; line-height: 1.1; margin-bottom: 4px; position: relative; z-index:1; }
        .stat-card .sc-lbl  { font-size: .71rem; color: var(--t3); font-weight: 600; text-transform: uppercase; letter-spacing: .7px; position: relative; z-index:1; }
        .stat-card .sc-sub  { font-size: .74rem; color: var(--t2); margin-top: 5px; position: relative; z-index:1; }

        .sc-blue   { --sc-accent:var(--blue);   --sc-bg:var(--blue-l);   }
        .sc-green  { --sc-accent:var(--green);  --sc-bg:var(--green-l);  }
        .sc-red    { --sc-accent:var(--red);    --sc-bg:var(--red-l);    }
        .sc-yellow { --sc-accent:var(--yellow); --sc-bg:var(--yellow-l); }
        .sc-cyan   { --sc-accent:var(--cyan);   --sc-bg:var(--cyan-l);   }
        .sc-purple { --sc-accent:var(--purple); --sc-bg:var(--purple-l); }
        .sc-orange { --sc-accent:var(--orange); --sc-bg:var(--orange-l); }

        .sc-blue .sc-val   { color: var(--blue); }
        .sc-green .sc-val  { color: var(--green); }
        .sc-red .sc-val    { color: var(--red); }
        .sc-yellow .sc-val { color: var(--yellow); }
        .sc-cyan .sc-val   { color: var(--cyan); }
        .sc-purple .sc-val { color: var(--purple); }
        .sc-orange .sc-val { color: var(--orange); }

        /* ══ TABLES ══ */
        .table { color: var(--t1); margin: 0; }
        .table thead th {
            background: rgba(116,116,128,0.06);
            color: var(--t3); font-size: .69rem;
            font-weight: 700; text-transform: uppercase; letter-spacing: .7px;
            border-bottom: 1px solid var(--border);
            padding: 10px 16px; white-space: nowrap;
        }
        .table tbody td {
            border-bottom: 1px solid rgba(118,118,128,0.12);
            padding: 11px 16px; vertical-align: middle;
        }
        .table tbody tr:last-child td { border-bottom: none; }
        .table tbody tr { transition: background 150ms; }
        .table tbody tr:hover td { background: rgba(116,116,128,0.08); }

        /* ══ PNL COLORS ══ */
        .up { color: var(--green) !important; }
        .dn { color: var(--red)   !important; }
        .t-blue   { color: var(--blue)   !important; }
        .t-yellow { color: var(--yellow) !important; }
        .t-cyan   { color: var(--cyan)   !important; }
        .t-purple { color: var(--purple) !important; }
        .t-muted  { color: var(--t2)     !important; }
        .t-dim    { color: var(--t3)     !important; }
        .fw-7 { font-weight: 700; }
        .fw-8 { font-weight: 800; }
        .mono { font-family: 'SF Mono','Menlo','Monaco','Courier New',monospace; }

        /* ══ TAGS — 无 border，只用 wash 背景 ══ */
        .tag-up {
            background: var(--green-l); color: var(--green);
            padding: 2px 10px; border-radius: 999px;
            font-size: .78rem; font-weight: 600; white-space: nowrap;
        }
        .tag-dn {
            background: var(--red-l); color: var(--red);
            padding: 2px 10px; border-radius: 999px;
            font-size: .78rem; font-weight: 600; white-space: nowrap;
        }
        .tag-blue {
            background: var(--blue-l); color: var(--blue);
            padding: 2px 10px; border-radius: 999px;
            font-size: .78rem; font-weight: 600; white-space: nowrap;
        }
        .tag-yellow {
            background: var(--yellow-l); color: var(--yellow);
            padding: 2px 10px; border-radius: 999px;
            font-size: .78rem; font-weight: 600; white-space: nowrap;
        }
        .tag-gray {
            background: rgba(118,118,128,0.12); color: var(--t2);
            padding: 2px 10px; border-radius: 999px;
            font-size: .78rem; font-weight: 500; white-space: nowrap;
        }

        /* ══ CHAIN BADGES ══ */
        .chain-badge {
            font-size: .65rem; font-weight: 700;
            padding: 2px 8px; border-radius: 6px; white-space: nowrap; letter-spacing: .3px;
        }
        .c-1    { background: rgba(88,86,214,.10);  color: #5856D6; }
        .c-56   { background: rgba(255,149,0,.10);  color: #FF9500; }
        .c-8453 { background: rgba(0,122,255,.10);  color: #007AFF; }
        .c-501  { background: rgba(175,82,222,.10); color: #AF52DE; }

        /* ══ SCORE ══ */
        .score-pill {
            font-family: 'SF Mono','Menlo','Monaco','Courier New',monospace;
            font-size: .8rem; font-weight: 700;
            padding: 3px 10px; border-radius: 999px;
            background: var(--blue-l); color: var(--blue);
        }
        .score-pill.s-high { background: var(--green-l);  color: var(--green);  }
        .score-pill.s-med  { background: var(--yellow-l); color: var(--yellow); }

        /* ══ ADDRESS ══ */
        .addr {
            font-family: 'SF Mono','Menlo','Monaco','Courier New',monospace;
            font-size: .77rem;
            color: var(--blue); cursor: pointer; text-decoration: none;
        }
        .addr:hover { opacity: .7; text-decoration: underline; }

        /* ══ BUTTONS — Apple 纯色 + opacity 交互 ══ */
        .btn-primary-g {
            background: #007AFF;
            color: #fff; border: none; border-radius: 8px;
            padding: 7px 18px; font-size: .82rem; font-weight: 600;
            cursor: pointer; white-space: nowrap;
            transition: opacity 150ms ease, transform 150ms cubic-bezier(0.34,1.56,0.64,1.00);
        }
        .btn-primary-g:hover  { opacity: .88; transform: scale(1.01); }
        .btn-primary-g:active { opacity: .70; transform: scale(0.97); }
        .btn-outline {
            background: var(--bg-card); color: var(--t2);
            border: 1px solid var(--border);
            border-radius: 8px; padding: 6px 14px;
            font-size: .78rem; font-weight: 500;
            cursor: pointer; white-space: nowrap;
            text-decoration: none; display: inline-block;
            transition: all 150ms ease; box-shadow: var(--sh-0);
        }
        .btn-outline:hover {
            color: var(--blue); background: var(--blue-l);
            transform: translateY(-1px);
        }
        .btn-green-o {
            background: var(--green-l); color: var(--green);
            border-radius: 6px; padding: 4px 11px;
            font-size: .75rem; font-weight: 600;
            cursor: pointer; text-decoration: none; display: inline-block;
            transition: opacity 150ms ease, transform 150ms ease;
        }
        .btn-green-o:hover { opacity: .8; transform: translateY(-1px); }

        /* ══ TABS — Apple Segmented Control ══ */
        .tab-row {
            display: inline-flex; gap: 2px;
            background: rgba(118,118,128,0.12);
            border-radius: 10px; padding: 2px;
        }
        .tab-item {
            padding: 5px 14px; border-radius: 8px;
            font-size: .8rem; font-weight: 500; color: var(--t2);
            cursor: pointer; transition: all 150ms ease;
            white-space: nowrap; user-select: none;
        }
        .tab-item:hover:not(.active) { color: var(--t1); background: rgba(116,116,128,0.08); }
        .tab-item.active {
            background: #fff; color: var(--t1);
            font-weight: 600;
            box-shadow: 0 1px 3px rgba(0,0,0,.10);
        }

        /* ══ MISC ══ */
        .pulse-dot {
            display: inline-block; width: 7px; height: 7px;
            border-radius: 50%; background: var(--green);
            animation: livePulse 2s infinite;
        }
        .page-wrap { padding: 22px 28px; max-width: 1640px; margin: 0 auto; }
        .empty-state { padding: 44px 20px; text-align: center; color: var(--t3); }
        .price-item { display:flex; align-items:center; gap:4px; flex-wrap:wrap; }
        .price-sym  { font-size:.65rem; font-weight:700; color:var(--t3); min-width:26px; }
        .price-val  { font-size:.78rem; font-weight:800; color:var(--t1); }
        .price-chg  { font-size:.6rem;  font-weight:600; margin-left:1px; }
        .empty-state .ei { font-size: 2.4rem; margin-bottom: 12px; }
        .info-pill {
            display: inline-flex; align-items: center; gap: 4px;
            font-size: .72rem; color: var(--t2);
            background: rgba(118,118,128,0.12);
            border-radius: 999px; padding: 2px 10px;
        }
        .token-logo { width: 26px; height: 26px; border-radius: 50%; border: 1px solid var(--border); }
        .mini-bar { height: 3px; background: rgba(118,118,128,0.12); border-radius: 999px; overflow: hidden; margin-top: 8px; }
        .mini-bar-fill { height: 100%; border-radius: 999px; background: var(--blue); }
        .section-hd { font-size: .69rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--t3); margin-bottom: 14px; }

        /* Rank rows */
        .rank-1 { background: linear-gradient(90deg, rgba(255,204,0,.06), transparent) !important; }
        .rank-2 { background: linear-gradient(90deg, rgba(142,142,147,.04), transparent) !important; }
        .rank-3 { background: linear-gradient(90deg, rgba(162,132,94,.03), transparent) !important; }
        .rank-1:hover td, .rank-2:hover td, .rank-3:hover td { background: rgba(116,116,128,0.08) !important; }

        .sig-row td:first-child { border-left: 3px solid var(--green); }
    </style>
    <!-- 工具函数：提前定义，保证所有页面脚本都能调用 -->
    <script>
    function fmtUsd(v,d=0){
        const n=parseFloat(v)||0,a=Math.abs(n),sg=n<0?'-':'';
        if(a>=1e9) return sg+'$'+(a/1e9).toFixed(1)+'B';
        if(a>=1e6) return sg+'$'+(a/1e6).toFixed(1)+'M';
        if(a>=1e3) return sg+'$'+(a/1e3).toFixed(1)+'K';
        return sg+'$'+a.toFixed(d);
    }
    function fmtMcap(v){
        const n=parseFloat(v)||0;
        if(n<=0)   return '—';
        if(n>=1e9) return '$'+(n/1e9).toFixed(1)+'B';
        if(n>=1e6) return '$'+(n/1e6).toFixed(1)+'M';
        if(n>=100) return '$'+(n/1e3).toFixed(1)+'K';
        return '$0.1K';
    }
    </script>
</head>

    <div class="nav-links">

        <a class="nav-link" th:classappend="${activePage=='onchain-holder'? ' active' : ''}" href="/onchain-holder">🔍 链上持仓</a>
        <a class="nav-link" th:classappend="${activePage=='portfolio'  ? ' active' : ''}" href="/portfolio">💼 我的持仓</a>
        <a class="nav-link" th:classappend="${activePage=='my-addresses'? ' active' : ''}" href="/my-addresses">📌 关注地址</a>
        <!--

              pointer-events:none;user-select:none;letter-spacing:.02em">

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const clockEl = document.getElementById('clock');
function tick() {
    clockEl.textContent = new Date().toLocaleString('zh-CN',{
        timeZone:'Asia/Shanghai',month:'2-digit',day:'2-digit',
        hour:'2-digit',minute:'2-digit',second:'2-digit'
    });
}
tick(); setInterval(tick,1000);

const $ = s => document.querySelector(s);
const $$ = s => [...document.querySelectorAll(s)];

// fmtUsd / fmtMcap 已在 <head> 定义
function copyAddr(addr){
    if(navigator.clipboard && window.isSecureContext){
        navigator.clipboard.writeText(addr).then(()=>_toast('✅ 已复制')).catch(()=>_fallbackCopy(addr));
    } else {
        _fallbackCopy(addr);
    }
}
function _fallbackCopy(addr){
    const el=document.createElement('textarea');
    el.value=addr; el.style.cssText='position:fixed;opacity:0;top:0;left:0;';
    document.body.appendChild(el); el.focus(); el.select();
    try{ document.execCommand('copy'); _toast('✅ 已复制'); }
    catch(e){ _toast('❌ 复制失败，请手动选中复制'); }
    document.body.removeChild(el);
}
function _toast(msg){
    let t=document.getElementById('_copy_toast');
    if(!t){ t=document.createElement('div'); t.id='_copy_toast';
        t.style.cssText='position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:rgba(50,50,55,.94);color:#fff;padding:9px 22px;border-radius:12px;z-index:9999;font-size:.84rem;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);';
        document.body.appendChild(t); }
    t.textContent=msg; t.style.opacity='1'; t.style.display='block';
    clearTimeout(t._t); t._t=setTimeout(()=>{ t.style.opacity='0'; setTimeout(()=>t.style.display='none',200); },2000);
}
</script>
