<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Encrypt</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
     background:#f5f5f5;display:flex;align-items:center;justify-content:center;
     min-height:100vh;color:#1a1a1a}
.card{background:#fff;border-radius:10px;box-shadow:0 2px 12px rgba(0,0,0,.08);
      padding:40px 44px;width:420px;max-width:94vw}
h2{font-size:1.1rem;font-weight:600;margin-bottom:28px;color:#333;letter-spacing:.02em}
label{display:block;font-size:.8rem;font-weight:500;color:#555;margin-bottom:5px}
input[type=text],input[type=password]{
  width:100%;border:1px solid #ddd;border-radius:6px;padding:9px 12px;
  font-size:.88rem;outline:none;transition:border .15s}
input[type=text]:focus,input[type=password]:focus{border-color:#6366f1}
.field{margin-bottom:18px}
button{width:100%;background:#6366f1;color:#fff;border:none;border-radius:6px;
       padding:11px;font-size:.9rem;font-weight:600;cursor:pointer;margin-top:4px;
       transition:background .15s}
button:hover{background:#4f46e5}
.msg{margin-top:20px;text-align:center;font-size:.88rem}
.done{color:#16a34a;font-weight:600;font-size:1rem}
.err{color:#dc2626}
</style>
</head>
<body>
<div class="card">
  <h2>File Encrypt</h2>
  <form method="post" th:action="@{/encrypt}" autocomplete="off">
    <div class="field">
      <label>File Path</label>
      <input type="text" name="filePath" placeholder="/path/to/file.txt" required/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" name="password" placeholder="encryption password" required/>
    </div>
    <button type="submit">Encrypt</button>
  </form>

  <div class="msg" th:if="${done}">
    <span class="done">✓ Finish</span>
  </div>
  <div class="msg" th:if="${error}">
    <span class="err" th:text="${error}"></span>
  </div>
</div>
</body>
</html>
