spring:
  application:
    name: aios-dashboard
  task:
    scheduling:
      pool:
        size: 20  # 实际 @Scheduled 方法共 17 个，OKX fetchAllRates 单次阻塞 6min，需留足裕量
  datasource:
    url: jdbc:mysql://${DB_HOST:43.134.118.142}:${DB_PORT:33066}/oc_os?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: ${DB_USER:arb}
    password: ${DB_PASS:arb123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate.dialect: org.hibernate.dialect.MySQL8Dialect
  jackson:
    time-zone: Asia/Shanghai
  thymeleaf:
    cache: false
    encoding: UTF-8

server:
  port: 9900

logging:
  config: classpath:log4j2.xml

okx:
  api-key: ${OKX_API_KEY}
  api-secret: ${OKX_API_SECRET}
  passphrase: ${OKX_PASSPHRASE}
  base-www: https://www.okx.com
  base-web3: https://web3.okx.com

# ── Smart Money Job 配置 ──────────────────────────────────────
smart-money:
  jobs:
    # 信号抓取 Job
    signal-fetch:
      enabled: true
      interval-minutes: 1          # 每 1 分钟抓一次信号
      chains: "56,501"             # BSC,SOL
      wallet-types: "1"            # 1=Smart Money 2=KOL 3=Whale
      min-amount-usd: "5000"       # 最小买入金额过滤
      min-market-cap-usd: 10000   # 市值低于 10K 的信号过滤（避免数据异常/垃圾币）
    # 钱包分析 Job（仅更新评分/胜率/PnL，不抓 overview/tx）
    wallet-analyze:
      enabled: true
      interval-minutes: 5          # 每 5 分钟分析一批
      time-frame: "3"
      max-wallets: 20              # 每次 20 个，限流了就等下次

# ── Perps 永续合约配置 ────────────────────────────────────────────
perp:
  # 新品种发现时飞书 Webhook 报警地址（POST JSON）
  alert-url: https://open.feishu.cn/open-apis/bot/v2/hook/41e5313b-9dae-413f-aaf7-6d293d2feb55

  # ── 详情页缓存配置（Web 触发，缓存过期才打 OKX API）──────────
  cache:
    overview-ttl-seconds: 300      # overview 缓存 5 分钟
    tx-history-ttl-seconds: 30     # tx_history 缓存 30 秒
    tx-history-limit: 50           # 每次拉取最近多少笔交易

# ── 链上持仓监控 RPC 配置 ─────────────────────────────────────────
onchain:
  eth-rpc: https://eth.llamarpc.com
  bsc-rpc: https://bsc-dataseed.binance.org/
