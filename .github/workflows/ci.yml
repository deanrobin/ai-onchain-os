name: CI — 编译检查

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    name: Maven 编译检查
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 编译（跳过测试）
        run: mvn -pl dashboard -am clean compile -q
        # 只做编译检查，不跑单元测试（测试依赖 DB 连接）

      - name: 检查是否有未处理的 TODO（可选警告）
        run: |
          COUNT=$(grep -rn "TODO\|FIXME\|HACK" dashboard/src/main/java/ | wc -l)
          echo "⚠️ 发现 $COUNT 处 TODO/FIXME/HACK"
          # 只警告，不阻断 CI
