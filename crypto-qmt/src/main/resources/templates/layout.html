<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="page(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title} + ' · Crypto QMT'">Crypto QMT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/binance-design.css">
    <style>
        /* Bootstrap 浅色背景覆盖 — 强制走我们的黑底 */
        body { background: var(--bg-base) !important; }
        .table { background: transparent; }
        .table > :not(caption) > * > * { background: transparent; color: inherit; box-shadow: none; }
    </style>
</head>
<body>

<nav class="topnav">
    <a class="brand" href="/">🟡 <span>Crypto QMT</span></a>
    <div class="nav-links">
        <a class="nav-link"
           th:classappend="${activePage=='btc-strategy' ? ' active' : ''}"
           href="/btc-strategy">📈 BTC K线</a>
    </div>
    <div class="nav-right">
        <span class="live-indicator">实时</span>
        <span class="clock-pill" id="clock">--</span>
    </div>
</nav>

<div class="page-wrap" th:insert="${content}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const clockEl = document.getElementById('clock');
function tick() {
    clockEl.textContent = new Date().toLocaleString('zh-CN', {
        timeZone: 'Asia/Shanghai',
        month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit', second: '2-digit'
    });
}
tick();
setInterval(tick, 1000);
</script>
</body>
</html>
